const ALL_DATA = [{"index": 1, "category": "not_exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "The only differences between the ORIGINAL and CORRECTED formalizations are (1) the ORIGINAL has `noncomputable section` which is omitted in the CORRECTED, and (2) spacing around the `*` operator (`x*y` vs `x * y`). Both are purely cosmetic and have no semantic impact in Lean 4. The logical statement is identical: for all x, y in the subgroup `closure {x | x = a ∨ x = b}`, we have x * y = y * x, given the hypothesis a * b = b * a. This faithfully captures the informal claim that the subgroup generated by two commuting elements is abelian. The informal statement is mathematically true and unambiguous, and the formalization is logically equivalent to the corrected version.", "original": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nLet $H$ be the subgroup generated by two elements $a, b$ of a group $G$. Prove that if $a b=b a$, then $H$ is an abelian group.\n-/\n\ntheorem Artin_exercise_2_2_9 {G : Type*} [Group G] {a b : G}\n  (h : a * b = b * a) :\n  ∀ x y : closure {x | x = a ∨ x = b}, x*y = y*x := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nLet $H$ be the subgroup generated by two elements $a, b$ of a group $G$. Prove that if $a b=b a$, then $H$ is an abelian group.\n-/\n\ntheorem Artin_exercise_2_2_9 {G : Type*} [Group G] {a b : G}\n  (h : a * b = b * a) :\n  ∀ x y : closure {x | x = a ∨ x = b}, x * y = y * x := by\n  sorry\n"}, {"index": 2, "category": "exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "Original and corrected formalizations are identical (modulo whitespace/formatting).", "original": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nProve that if a group contains exactly one element of order 2 , then that element is in the center of the group.\n-/\n\ntheorem Artin_exercise_2_4_19 {G : Type*} [Group G] {x : G}\n  (hx : orderOf x = 2) (hx1 : ∀ y, orderOf y = 2 → y = x) :\n  x ∈ center G := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nProve that if a group contains exactly one element of order 2 , then that element is in the center of the group.\n-/\n\ntheorem Artin_exercise_2_4_19 {G : Type*} [Group G] {x : G}\n  (hx : orderOf x = 2) (hx1 : ∀ y, orderOf y = 2 → y = x) :\n  x ∈ center G := by\n  sorry\n"}, {"index": 3, "category": "exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "Original and corrected formalizations are identical (modulo whitespace/formatting).", "original": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nProve that a group of even order contains an element of order $2 .$\n-/\n\ntheorem Artin_exercise_2_11_3 {G : Type*} [Group G] [Fintype G]\n  (hG : Even (card G)) : ∃ x : G, orderOf x = 2 := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nProve that a group of even order contains an element of order $2 .$\n-/\n\ntheorem Artin_exercise_2_11_3 {G : Type*} [Group G] [Fintype G]\n  (hG : Even (card G)) : ∃ x : G, orderOf x = 2 := by\n  sorry\n"}, {"index": 4, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "missing_premise", "provability": "true", "reasoning": "The informal statement specifies that V is spanned by a \"countably infinite\" set, meaning the spanning set S must be both countable AND infinite. The CORRECTED formalization captures this via two hypotheses: `hS : Set.Countable S` and `hSinf : S.Infinite`. The ORIGINAL formalization only has `hS : Set.Countable S`, and in Mathlib `Set.Countable` includes finite sets (as confirmed in Mathlib/Data/Set/Countable.lean: `protected def Countable (s : Set α) : Prop := Countable s`, which holds for finite sets). Thus the ORIGINAL drops the infiniteness premise. Q1: The informal statement is mathematically true and unambiguous. Q2: The ORIGINAL is STRONGER than the informal statement: it claims the conclusion for all V spanned by a countable set (including finite spanning sets, where V is finite-dimensional), which is a superset of the cases in the informal statement. The ORIGINAL implies the informal claim but asserts more. Q3: The stronger claim is still provably true: if S is finite, then V is finite-dimensional and any LI family has finite (hence countable) index type; if S is countably infinite, the standard result gives |ι| ≤ ℵ₀. Q4: The error is that the explicit \"infinite\" premise from \"countably infinite\" was dropped — this is a missing_premise.", "original": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nLet $V$ be a vector space which is spanned by a countably infinite set. Prove that every linearly independent subset of $V$ is finite or countably infinite.\n-/\n\ntheorem Artin_exercise_3_5_6 {K V : Type*} [Field K] [AddCommGroup V]\n  [Module K V] {S : Set V} (hS : Set.Countable S)\n  (hS1 : span K S = ⊤) {ι : Type*} (R : ι → V)\n  (hR : LinearIndependent K R) : Countable ι := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nLet $V$ be a vector space which is spanned by a countably infinite set. Prove that every linearly independent subset of $V$ is finite or countably infinite.\n-/\n\ntheorem Artin_exercise_3_5_6 {K V : Type*} [Field K] [AddCommGroup V]\n  [Module K V] {S : Set V} (hS : Set.Countable S) (hSinf : S.Infinite)\n  (hS1 : span K S = ⊤) {ι : Type*} (R : ι → V)\n  (hR : LinearIndependent K R) : Countable ι := by\n  sorry\n"}, {"index": 5, "category": "exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "Original and corrected formalizations are identical (modulo whitespace/formatting).", "original": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nLet $Z$ be the center of a group $G$. Prove that if $G / Z$ is a cyclic group, then $G$ is abelian and hence $G=Z$.\n-/\n\ntheorem Artin_exercise_6_1_14 (G : Type*) [Group G]\n  (hG : IsCyclic $ G ⧸ (center G)) :\n  center G = ⊤ := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nLet $Z$ be the center of a group $G$. Prove that if $G / Z$ is a cyclic group, then $G$ is abelian and hence $G=Z$.\n-/\n\ntheorem Artin_exercise_6_1_14 (G : Type*) [Group G]\n  (hG : IsCyclic $ G ⧸ (center G)) :\n  center G = ⊤ := by\n  sorry\n"}, {"index": 6, "category": "not_exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "The informal statement is a well-known result from Artin's Algebra: no group of order p²q (p, q prime) is simple. It is mathematically true and unambiguous.\n\nComparing the two formalizations:\n- Original: `IsSimpleGroup G → false` (lowercase)\n- Corrected: `IsSimpleGroup G → False` (capital)\n\nIn Lean 4, lowercase `false` is `Bool.false`. Through the `CoeSort Bool Prop` instance, when `false` appears in a position expecting a sort/proposition, it gets elaborated as `Bool.false = true`, which is a proposition that is provably equivalent to `False`. This is confirmed by the fact that other GT files in the same corpus (proofnet-188.lean and proofnet-189.lean) use the exact same `→ false` pattern and are verified as golden truth, and one of them explicitly uses `suffices h : False by exact h.elim` to discharge this goal.\n\nThe other differences (`p^2 *q` vs `p^2 * q`, and presence of `noncomputable section`) are purely cosmetic: whitespace is ignored by the parser, and the `noncomputable` modifier does not affect the theorem statement's meaning.\n\nBoth formalizations have the same premises (Group G, Fintype G, p q : ℕ, Prime p, Prime q, card G = p²q) and logically equivalent conclusions (the claim that G cannot be simple). Therefore the original is faithful to the informal statement.", "original": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nProve that no group of order $p^2 q$, where $p$ and $q$ are prime, is simple.\n-/\n\ntheorem Artin_exercise_6_4_3 {G : Type*} [Group G] [Fintype G] {p q : ℕ}\n  (hp : Prime p) (hq : Prime q) (hG : card G = p^2 *q) :\n  IsSimpleGroup G → false := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nProve that no group of order $p^2 q$, where $p$ and $q$ are prime, is simple.\n-/\n\ntheorem Artin_exercise_6_4_3 {G : Type*} [Group G] [Fintype G] {p q : ℕ}\n  (hp : Prime p) (hq : Prime q) (hG : card G = p^2 * q) :\n  IsSimpleGroup G → False := by\n  sorry\n"}, {"index": 7, "category": "exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "Original and corrected formalizations are identical (modulo whitespace/formatting).", "original": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nProve that two elements $a, b$ of a group generate the same subgroup as $b a b^2, b a b^3$.\n-/\n\ntheorem Artin_exercise_6_8_1 {G : Type*} [Group G]\n  (a b : G) : closure ({a, b} : Set G) = Subgroup.closure {b*a*b^2, b*a*b^3} := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nProve that two elements $a, b$ of a group generate the same subgroup as $b a b^2, b a b^3$.\n-/\n\n\ntheorem Artin_exercise_6_8_1 {G : Type*} [Group G]\n  (a b : G) : closure ({a, b} : Set G) = Subgroup.closure {b*a*b^2, b*a*b^3} := by\n  sorry\n"}, {"index": 8, "category": "exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "Original and corrected formalizations are identical (modulo whitespace/formatting).", "original": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nProve that in the ring $\\mathbb{Z}[x],(2) \\cap(x)=(2 x)$.\n-/\n\ntheorem Artin_exercise_10_2_4 :\n  span ({2} : Set $ Polynomial ℤ) ⊓ (span {X}) =\n  span ({2 * X} : Set $ Polynomial ℤ) := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Function Fintype Subgroup Ideal Polynomial Submodule Zsqrtd\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nProve that in the ring $\\mathbb{Z}[x],(2) \\cap(x)=(2 x)$.\n-/\n\ntheorem Artin_exercise_10_2_4 :\n  span ({2} : Set $ Polynomial ℤ) ⊓ (span {X}) =\n  span ({2 * X} : Set $ Polynomial ℤ) := by\n  sorry\n"}, {"index": 9, "category": "not_exact_not_faithful", "label": "weaker", "error_type": "adding_extra_case", "provability": "true", "reasoning": "The informal statement asserts that for any ideals I, J in a ring R and any x ∈ I ∩ J, the image of x in R/IJ is nilpotent. This is true in any commutative ring, since x ∈ I ∩ J implies x·x ∈ I·J, so (image of x)² = 0 in R ning": "The informal statement asserts that ZMod n, equipped with the specific residue class multiplication, fails to be a group (e.g., because 0 has no multiplicative inverse for n > 1). The corrected formalization captures this precisely: it says that it's not the case that every element has a two-sided multiplicative inverse under the standard multiplication of ZMod n.\n\nThe original formalization uses `IsEmpty (Group (ZMod n))`. In Mathlib, `Group` is a type class that extends `DivInvMonoid`, `Monoid`, `Mul`, etc., meaning `Group (ZMod n)` is the type of ALL possible group structures on the underlying type `ZMod n`, not specifically the one induced by the ring multiplication. Since `ZMod n` is a nonempty (finite) type for n ≥ 1, we can always transport a group structure onto it (for instance, by using the already-existing additive group structure, renamed as multiplication, or via any bijection with a known group of the same cardinality). Therefore `Group (ZMod n)` is a nonempty type, and `IsEmpty (Group (ZMod n))` is provably FALSE.\n\nIf `IsEmpty (Group (ZMod n))` were true, it would imply that the specific ring multiplication does not form a group (so original implies informal), making the original STRONGER than the informal claim. However, since the stronger claim is actually false, the original is provably false.\n\nThe error stems from misinterpreting \"not a group under multiplication of residue classes\" as \"no group structure exists\" rather than \"the specific multiplication operation doesn't form a group.\" This is a misunderstanding of the informal statement.", "original": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nProve that for all $n>1$ that $\\mathbb{Z}/n\\mathbb{Z}$ is not a group under multiplication of residue classes.\n-/\n\ntheorem Dummit_Foote_exercise_1_1_5 (n : ℕ) (hn : 1 < n) :\n  IsEmpty (Group (ZMod n)) := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nProve that for all $n>1$ that $\\mathbb{Z}/n\\mathbb{Z}$ is not a group under multiplication of residue classes.\n-/\n\ntheorem Dummit_Foote_exercise_1_1_5 (n : ℕ) (hn : 1 < n) :\n  ¬ (∀ x : ZMod n, ∃ y : ZMod n, x * y = (1 : ZMod n) ∧ y * x = 1) := by\n  sorry\n"}, {"index": 30, "category": "not_exact_not_faithful", "label": "weaker", "error_type": "misunderstanding_of_informal_statement", "provability": "true", "reasoning": "The informal statement says \"x^2 = 1 if and only if |x| is either 1 or 2\", which is a biconditional. The CORRECTED formalization correctly encodes this as `x ^ 2 = 1 ↔ (orderOf x = 1 ∨ orderOf x = 2)`. The ORIGINAL, however, takes `hx : x ^ 2 = 1` as a hypothesis and only concludes `orderOf x = 1 ∨ orderOf x = 2`, capturing just the forward direction of the iff. This makes the original statement strictly weaker than what the informal statement asks — it is implied by the biconditional but does not imply it. The forward direction alone is mathematically provable (if x² = 1, the order divides 2, so the order is 1 or 2), so the original statement is true. The error is a misreading of the \"if and only if\" as a one-way implication.", "original": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nLet $x$ be an element of $G$. Prove that $x^2=1$ if and only if $|x|$ is either $1$ or $2$.\n-/\n\ntheorem Dummit_Foote_exercise_1_1_16 {G : Type*} [Group G]\n  (x : G) (hx : x ^ 2 = 1) :\n  orderOf x = 1 ∨ orderOf x = 2 := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nLet $x$ be an element of $G$. Prove that $x^2=1$ if and only if $|x|$ is either $1$ or $2$.\n-/\n\ntheorem Dummit_Foote_exercise_1_1_16 {G : Type*} [Group G]\n  (x : G) : x ^ 2 = 1 ↔ (orderOf x = 1 ∨ orderOf x = 2) := by\n  sorry\n"}, {"index": 31, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "misunderstanding_of_informal_statement", "provability": "false", "reasoning": "The informal statement \"A iff B iff C\" (with A: xy=yx, B: y⁻¹xy=x, C: x⁻¹y⁻¹xy=1) is the standard chained biconditional meaning all three are equivalent, formalized as (A↔B)∧(B↔C), which is the corrected version. The original writes (A↔B)↔C. In any group, A↔B is a tautology (provable directly), so (A↔B)↔C reduces to True↔C, i.e., just C. Universally quantified over x, y ∈ G, this amounts to requiring G to be abelian, which fails for nonabelian groups (e.g., S₃ with x=(12), y=(13) gives x⁻¹y⁻¹xy ≠ 1). Thus the original implies the informal (the informal is a tautology) but the original is strictly stronger and actually false in general. The error is misreading the chain of iffs in the informal English as a nested biconditional rather than a conjunction of biconditionals — a misunderstanding of the informal statement.", "original": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nLet $x$ and $y$ be elements of $G$. Prove that $xy=yx$ if and only if $y^{-1}xy=x$ if and only if $x^{-1}y^{-1}xy=1$.\n-/\n\ntheorem Dummit_Foote_exercise_1_1_18 {G : Type*} [Group G]\n  (x y : G) : (x * y = y * x ↔ y⁻¹ * x * y = x) ↔ (x⁻¹ * y⁻¹ * x * y = 1) := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nLet $x$ and $y$ be elements of $G$. Prove that $xy=yx$ if and only if $y^{-1}xy=x$ if and only if $x^{-1}y^{-1}xy=1$.\n-/\n\ntheorem Dummit_Foote_exercise_1_1_18 {G : Type*} [Group G]\n  (x y : G) : (x * y = y * x ↔ y⁻¹ * x * y = x) ∧ (y⁻¹ * x * y = x ↔ x⁻¹ * y⁻¹ * x * y = 1) := by\n  sorry\n"}, {"index": 32, "category": "exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "Original and corrected formalizations are identical (modulo whitespace/formatting).", "original": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nIf $x$ and $g$ are elements of the group $G$, prove that $|x|=\\left|g^{-1} x g\\right|$.\n-/\n\ntheorem Dummit_Foote_exercise_1_1_22a {G : Type*} [Group G] (x g : G) :\n  orderOf x = orderOf (g⁻¹ * x * g) := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nIf $x$ and $g$ are elements of the group $G$, prove that $|x|=\\left|g^{-1} x g\\right|$.\n-/\n\ntheorem Dummit_Foote_exercise_1_1_22a {G : Type*} [Group G] (x g : G) :\n  orderOf x = orderOf (g⁻¹ * x * g) := by\n  sorry\n"}, {"index": 33, "category": "exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "Original and corrected formalizations are identical (modulo whitespace/formatting).", "original": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nProve that if $x^{2}=1$ for all $x \\in G$ then $G$ is abelian.\n-/\n\ntheorem Dummit_Foote_exercise_1_1_25 {G : Type*} [Group G]\n  (h : ∀ x : G, x ^ 2 = 1) : ∀ a b : G, a*b = b*a := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nProve that if $x^{2}=1$ for all $x \\in G$ then $G$ is abelian.\n-/\n\ntheorem Dummit_Foote_exercise_1_1_25 {G : Type*} [Group G]\n  (h : ∀ x : G, x ^ 2 = 1) : ∀ a b : G, a*b = b*a := by\n  sorry\n"}, {"index": 34, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "missing_implicit_premise", "provability": "false", "reasoning": "The informal statement says that for $x$ of infinite order, the powers $x^n$ for $n \\in \\mathbb{Z}$ are all distinct. This means: for all integers $n \\neq m$, $x^n \\neq x^m$.\n\nThe ORIGINAL formalization states `∀ n m : ℤ, x^n ≠ x^m` without the hypothesis `n ≠ m`. This is strictly stronger than the informal claim (it would imply it if it were true), but it is trivially false: taking `n = m` gives `x^n = x^m`, a contradiction. So the original statement is provably false (counterexample: `n = m = 0`, yielding `x^0 = 1 = x^0`).\n\nThe CORRECTED formalization adds the explicit hypothesis `hnm : n ≠ m`, which is the implicit premise hidden in the informal word \"distinct\". This missing premise is required for the statement to be true.\n\nQ1: The informal statement is a true, standard fact about elements of infinite order.\nQ2: The original is `stronger` than the informal claim (vacuously, since it's false) — it asserts more than \"all distinct\".\nQ3: The original is provably `false` (take n = m).\nQ4: The error is a `missing_implicit_premise` — the condition `n ≠ m` is implicit in the word \"distinct\" but was not encoded in the Lean statement.", "original": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nIf $x$ is an element of infinite order in $G$, prove that the elements $x^{n}, n \\in \\mathbb{Z}$ are all distinct.\n-/\n\ntheorem Dummit_Foote_exercise_1_1_34 {G : Type*} [Group G] {x : G}\n  (hx_inf : orderOf x = 0) (n m : ℤ) :\n  x ^ n ≠ x ^ m := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nIf $x$ is an element of infinite order in $G$, prove that the elements $x^{n}, n \\in \\mathbb{Z}$ are all distinct.\n-/\n\ntheorem Dummit_Foote_exercise_1_1_34 {G : Type*} [Group G] {x : G}\n  (hx_inf : orderOf x = 0) (n m : ℤ) (hnm : n ≠ m) :\n  x ^ n ≠ x ^ m := by\n  sorry\n"}, {"index": 35, "category": "not_exact_not_faithful", "label": "incomparable", "error_type": "misunderstanding_of_mathlib", "provability": "false", "reasoning": "The informal statement asks about the multiplicative groups ℝ \\ {0} and ℂ \\ {0}, which is faithfully captured by the corrected version using `ℝˣ` and `ℂˣ` (units of a ring, i.e., nonzero elements with multiplication). The original uses `Multiplicative ℝ` and `Multiplicative ℂ`, but in Mathlib `Multiplicative α` is a type synonym that reinterprets α's ADDITIVE structure as a multiplicative one — so `Multiplicative ℝ` is the additive group (ℝ, +) written multiplicatively, not ℝ \\ {0}. As abelian groups, (ℝ, +) and (ℂ, +) are both divisible torsion-free abelian groups of cardinality 2^ℵ₀ (equivalently, ℚ-vector spaces of dimension 2^ℵ₀), hence ARE isomorphic. So `Multiplicative ℝ ≃* Multiplicative ℂ` is nonempty, and the original `IsEmpty (...)` claim is provably false. This is a misunderstanding of Mathlib's `Multiplicative` API — the correct way to express ℝ \\ {0} as a multiplicative group is `ℝˣ`.", "original": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nProve that the multiplicative groups $\\mathbb{R}-\\{0\\}$ and $\\mathbb{C}-\\{0\\}$ are not isomorphic.\n-/\n\ntheorem Dummit_Foote_exercise_1_6_4 :\n  IsEmpty (Multiplicative ℝ ≃* Multiplicative ℂ) := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nProve that the multiplicative groups $\\mathbb{R}-\\{0\\}$ and $\\mathbb{C}-\\{0\\}$ are not isomorphic.\n-/\n\ntheorem Dummit_Foote_exercise_1_6_4 :\n    IsEmpty (ℝˣ ≃* ℂˣ) := by\n  sorry\n"}, {"index": 36, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "misunderstanding_of_lean", "provability": "false", "reasoning": "In Lean 4, `∀` has very low precedence and extends to the right through `↔`. So the ORIGINAL `∀ x y : G, f x * f y = f (x*y) ↔ ∀ x y : G, x*y = y*x` actually parses as `∀ x y : G, (f x * f y = f (x*y) ↔ ∀ x y : G, x*y = y*x)`, not as the intended `(∀ x y, f x * f y = f(x*y)) ↔ (∀ x y, x*y = y*x)` shown in the CORRECTED version. Mathlib consistently parenthesizes the left-hand `∀` when it should be bounded (e.g., `forall_swap : (∀ x y, p x y) ↔ ∀ y x, p x y`), confirming this parsing. Letting P(x,y) := \"f x * f y = f(xy)\" and Q := \"G is abelian\": the original reads ∀ x y, (P(x,y) ↔ Q), which implies the corrected (∀ x y, P(x,y)) ↔ Q (since G is nonempty), but the converse fails — so the original is strictly STRONGER. The original is also provably FALSE: for any non-abelian group (e.g., S₃), take x = y = 1; then P(1,1) is true (1·1 = 1) but Q is false, so the biconditional fails. The informal statement is the standard clear claim (inverse map is hom iff G abelian), which is true and unambiguous. The error is Lean-specific: missing parentheses around the left `∀`-quantifier scope.", "original": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nLet $G$ be any group. Prove that the map from $G$ to itself defined by $g \\mapsto g^{-1}$ is a homomorphism if and only if $G$ is abelian.\n-/\n\ntheorem Dummit_Foote_exercise_1_6_17 {G : Type*} [Group G] (f : G → G)\n  (hf : f = λ g => g⁻¹) :\n  ∀ x y : G, f x * f y = f (x*y) ↔ ∀ x y : G, x*y = y*x := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nLet $G$ be any group. Prove that the map from $G$ to itself defined by $g \\mapsto g^{-1}$ is a homomorphism if and only if $G$ is abelian.\n-/\n\ntheorem Dummit_Foote_exercise_1_6_17 {G : Type*} [Group G] (f : G → G)\n  (hf : f = λ g => g⁻¹) :\n  (∀ x y : G, f x * f y = f (x*y)) ↔ ∀ x y : G, x*y = y*x := by\n  sorry\n"}, {"index": 37, "category": "exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "Original and corrected formalizations are identical (modulo whitespace/formatting).", "original": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nProve that $G$ cannot have a subgroup $H$ with $|H|=n-1$, where $n=|G|>2$.\n-/\n\ntheorem Dummit_Foote_exercise_2_1_5 {G : Type*} [Group G] [Fintype G]\n  (hG : card G > 2) (H : Subgroup G) [Fintype H] :\n  card H ≠ card G - 1 := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nProve that $G$ cannot have a subgroup $H$ with $|H|=n-1$, where $n=|G|>2$.\n-/\n\ntheorem Dummit_Foote_exercise_2_1_5 {G : Type*} [Group G] [Fintype G]\n  (hG : card G > 2) (H : Subgroup G) [Fintype H] :\n  card H ≠ card G - 1 := by\n  sorry\n"}, {"index": 38, "category": "not_exact_not_faithful", "label": "incomparable", "error_type": "misunderstanding_of_informal_statement", "provability": "false", "reasoning": "The informal statement says \"H is generated by the set H-{1}\", which means the subgroup closure of H\\{1} equals H. The CORRECTED version captures this as `Subgroup.closure ((H : Set G) \\ {1}) = H`. The ORIGINAL instead writes `closure ((H : Set G) \\ {1}) = ⊤`, claiming this closure equals the whole group G (the top subgroup). This is mathematically false for any proper subgroup H (e.g., H = {0,2} in Z/4: the closure of H\\{identity} equals H, not the whole group). The two statements are incomparable in general — they only coincide when H = ⊤. The error is a misreading of the informal statement: the author replaced \"equals H\" with \"equals the whole group\", apparently confusing the role of H as subject with H as the subgroup meant to be generated.", "original": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nProve that if $H$ is a subgroup of $G$ then $H$ is generated by the set $H-\\{1\\}$.\n-/\n\ntheorem Dummit_Foote_exercise_2_4_4 {G : Type*} [Group G] (H : Subgroup G) :\n  closure ((H : Set G) \\ {1}) = ⊤ := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nProve that if $H$ is a subgroup of $G$ then $H$ is generated by the set $H-\\{1\\}$.\n-/\n\ntheorem Dummit_Foote_exercise_2_4_4 {G : Type*} [Group G] (H : Subgroup G) :\n    Subgroup.closure ((H : Set G) \\ {1}) = H := by\n  sorry\n"}, {"index": 39, "category": "exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "Original and corrected formalizations are identical (modulo whitespace/formatting).", "original": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nShow that the subgroup of all rotations in a dihedral group is a maximal subgroup.\n-/\n\ntheorem Dummit_Foote_exercise_2_4_16b {n : ℕ} {hn : n ≠ 0}\n  {R : Subgroup (DihedralGroup n)}\n  (hR : R = Subgroup.closure {DihedralGroup.r 1}) :\n  R ≠ ⊤ ∧\n  ∀ K : Subgroup (DihedralGroup n), R ≤ K → K = R ∨ K = ⊤ := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nShow that the subgroup of all rotations in a dihedral group is a maximal subgroup.\n-/\n\ntheorem Dummit_Foote_exercise_2_4_16b {n : ℕ} {hn : n ≠ 0}\n  {R : Subgroup (DihedralGroup n)}\n  (hR : R = Subgroup.closure {DihedralGroup.r 1}) :\n  R ≠ ⊤ ∧\n  ∀ K : Subgroup (DihedralGroup n), R ≤ K → K = R ∨ K = ⊤ := by\n  sorry\n"}, {"index": 40, "category": "exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "Original and corrected formalizations are identical (modulo whitespace/formatting).", "original": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal nopen Topology Filter Real Complex TopologicalSpace Finset\nopen scoped BigOperators InnerProductSpace\n\n\n\n/-Informal Statement\n\nIf $k \\geq 2$ and $\\mathbf{x} \\in R^{k}$, prove that there exists $\\mathbf{y} \\in R^{k}$ such that $\\mathbf{y} \\neq 0$ but $\\mathbf{x} \\cdot \\mathbf{y}=0$\n-/\n\ntheorem Rudin_exercise_1_18a\n  (n : ℕ)\n  (h : n > 1)\n  (x : EuclideanSpace ℝ (Fin n)) -- R^n\n  : ∃ (y : EuclideanSpace ℝ (Fin n)), y ≠ 0 ∧ ⟪x, y⟫_ℝ = 0 := by\n  sorry\n"}, {"index": 155, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "misunderstanding_of_informal_statement", "provability": "false", "reasoning": "The informal statement is Rudin Exercise 2.24 (Bolzano-Weierstrass property ⇒ separability for metric spaces), which is a well-known true theorem. In Rudin's terminology (Def. 2.18(b)), a \"limit point\" of E is a point p such that every neighborhood of p contains a point q ≠ p with q ∈ E — i.e., exactly Mathlib's `AccPt p (𝓟 E)`, as used in the corrected version.\n\nThe original uses `∃ x : X, x ∈ closure A` instead. But any element of A itself lies in `closure A`, and `Infinite A` implies A is nonempty, so this hypothesis is trivially satisfied by EVERY metric space. The original therefore states \"every metric space is separable,\" which is mathematically false — an uncountable set with the discrete metric is a counterexample (every infinite subset is in its own closure, yet the space is not separable).\n\nSince the original's hypothesis is vacuously weaker than the informal's (strict implication: AccPt ⇒ x ∈ closure A, but not conversely), and the conclusion is the same, the original asserts more and is thus stronger (and false). The error is a misunderstanding of the informal statement's term \"limit point,\" which in Rudin's book is strictly accumulation point (AccPt), not just \"point in the closure.\"", "original": "import Mathlib\n\nopen Topology Filter Real Complex TopologicalSpace Finset\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nLet $X$ be a metric space in which every infinite subset has a limit point. Prove that $X$ is separable.\n-/\n\ntheorem Rudin_exercise_2_24 {X : Type*} [MetricSpace X]\n  (hX : ∀ (A : Set X), Infinite A → ∃ (x : X), x ∈ closure A) :\n  SeparableSpace X := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Topology Filter Real Complex TopologicalSpace Finset\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nLet $X$ be a metric space in which every infinite subset has a limit point. Prove that $X$ is separable.\n-/\n\ntheorem Rudin_exercise_2_24\n    {X : Type*} [MetricSpace X]\n    (hBW : ∀ A : Set X, A.Infinite → ∃ p : X, AccPt p (𝓟 A)) :\n    SeparableSpace X :=\n  sorry\n"}, {"index": 156, "category": "not_exact_not_faithful", "label": "incomparable", "error_type": "misunderstanding_of_informal_statement", "provability": "true", "reasoning": "The informal statement is a standard Rudin exercise (2.27a) and is true and unambiguous: the set of condensation points of an uncountable subset of R^k is perfect.\n\nThe ORIGINAL has multiple serious errors:\n1. In `hP`, it writes `¬ Set.Countable (P ∩ E)` instead of `¬ Set.Countable (U ∩ E)`. Since `P ∩ E` does not depend on U, this dramatically changes the meaning — the condition becomes \"P ∩ E is uncountable\" (a property independent of x). This forces P to be either `Set.univ` or `∅`, not the set of condensation points.\n2. The conclusion `IsClosed P ∧ P = {x | ClusterPt x (𝓟 P)}` is not equivalent to `Perfect P`. By `mem_closure_iff_clusterPt`, the equality `P = {x | ClusterPt x (𝓟 P)}` is just equivalent to `closure P = P`, i.e., `IsClosed P` — so the conclusion is effectively just IsClosed, which is strictly weaker than Perfect (Perfect = IsClosed + Preperfect, where Preperfect uses AccPt with punctured neighborhoods 𝓝[≠] x, not ClusterPt).\n3. Adds redundant `E.Nonempty`.\n\nThese errors make the original statement incomparable with the informal one: the hypothesis defines a completely different object (either univ or ∅ rather than the condensation points), and the conclusion is weaker. However, the original is still provable because given its hypothesis, P must be univ or ∅, and in both cases the weak conclusion holds trivially.\n\nThe primary error is a misunderstanding of the informal statement — the author misread the definition of condensation point (putting `P ∩ E` where `U ∩ E` was needed) and misunderstood what \"perfect\" means (encoding it as just \"closed\" via ClusterPt instead of the correct Perfect = IsClosed + accumulation points via AccPt).", "original": "import Mathlib\n\nopen Topology Filter Real Complex TopologicalSpace Finset\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nSuppose $E\\subset\\mathbb{R}^k$ is uncountable, and let $P$ be the set of condensation points of $E$. Prove that $P$ is perfect.\n-/\n\ntheorem Rudin_exercise_2_27a (k : ℕ) (E P : Set (EuclideanSpace ℝ (Fin k)))\n  (hE : E.Nonempty ∧ ¬ Set.Countable E)\n  (hP : P = {x | ∀ U ∈ 𝓝 x, ¬ Set.Countable (P ∩ E)}) :\n  IsClosed P ∧ P = {x | ClusterPt x (𝓟 P)} := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Topology Filter Real Complex TopologicalSpace Finset\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nSuppose $E\\subset\\mathbb{R}^k$ is uncountable, and let $P$ be the set of condensation points of $E$. Prove that $P$ is perfect.\n-/\n\ntheorem Rudin_exercise_2_27a (k : ℕ) (E P : Set (EuclideanSpace ℝ (Fin k)))\n  (hE : ¬ Set.Countable E)\n  (hP : P = {x | ∀ U ∈ 𝓝 x, ¬ Set.Countable (U ∩ E)}) :\n  Perfect P := by\n  sorry\n"}, {"index": 157, "category": "not_exact_not_faithful", "label": "weaker", "error_type": "misunderstanding_of_mathlib", "provability": "true", "reasoning": "The informal statement is the Cantor–Bendixson theorem for separable metric spaces: every closed set is the union of a perfect set and an at-most-countable set. This is true and unambiguous.\n\nThe corrected formalization uses `Perfect P₁`, which in Mathlib means `IsClosed P₁ ∧ Preperfect P₁`, where `Preperfect` requires every point of P₁ to satisfy `AccPt x (𝓟 P₁)`, i.e., `NeBot (𝓝[≠] x ⊓ 𝓟 P₁)` — using the punctured neighborhood. This matches the classical notion of a perfect set (closed + every point is a limit point).\n\nThe original formalization replaces `Perfect P₁` with `IsClosed P₁ ∧ P₁ = {x | ClusterPt x (𝓟 P₁)}`. But `ClusterPt x (𝓟 P₁)` is `NeBot (𝓝 x ⊓ 𝓟 P₁)` (using the full neighborhood, not punctured), and by `mem_closure_iff_clusterPt`, `{x | ClusterPt x (𝓟 P₁)} = closure P₁`. So the condition `P₁ = {x | ClusterPt x (𝓟 P₁)}` is equivalent to `closure P₁ = P₁`, i.e., `P₁` is closed — which is already assumed. The extra conjunct adds nothing.\n\nTherefore, the original formalization is equivalent to: \"A is the union of a closed set and a countable set,\" which is strictly weaker than the informal statement (the closed set is not required to be perfect). It is trivially provable by taking P₁ = A and P₂ = ∅.\n\nThe error is a confusion between Mathlib's `ClusterPt` (closure points, full neighborhood) and `AccPt` (accumulation/limit points, punctured neighborhood). This is a misunderstanding of Mathlib API.", "original": "import Mathlib\n\nopen Topology Filter Real Complex TopologicalSpace Finset\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nProve that every closed set in a separable metric space is the union of a (possibly empty) perfect set and a set which is at most countable.\n-/\n\ntheorem Rudin_exercise_2_28 (X : Type*) [MetricSpace X] [SeparableSpace X]\n  (A : Set X) (hA : IsClosed A) :\n  ∃ P₁ P₂ : Set X, A = P₁ ∪ P₂ ∧\n  IsClosed P₁ ∧ P₁ = {x | ClusterPt x (𝓟 P₁)} ∧\n  Set.Countable P₂ := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Topology Filter Real Complex TopologicalSpace Finset\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nProve that every closed set in a separable metric space is the union of a (possibly eaning. The only real error is the missing finiteness premise. Without finiteness, the statement is FALSE: the Prüfer p-group ℤ(p^∞) is an infinite group with proper subgroups (e.g., {0}) but no maximal subgroups at all, since its subgroup lattice is a strictly ascending chain. Thus the original statement is provably false, and the error is a missing explicit premise from the informal statement.", "original": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nA subgroup $M$ of a group $G$ is called a maximal subgroup if $M \\neq G$ and the only subgroups of $G$ which contain $M$ are $M$ and $G$. Prove that if $H$ is a proper subgroup of the finite group $G$ then there is a maximal subgroup of $G$ containing $H$.\n-/\n\ntheorem Dummit_Foote_exercise_2_4_16a {G : Type*} [Group G] {H : Subgroup G}\n  (hH : H ≠ ⊤) :\n  ∃ M : Subgroup G, M ≠ ⊤ ∧\n  ∀ K : Subgroup G, M ≤ K → K = M ∨ K = ⊤ ∧\n  H ≤ M := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Fintype Subgroup Set Polynomial Ideal\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nA subgroup $M$ of a group $G$ is called a maximal subgroup if $M \\neq G$ and the only subgroups of $G$ which contain $M$ are $M$ and $G$. Prove that if $H$ is a proper subgroup of the finite group $G$ then there is a maximal subgroup of $G$ containing $H$.\n-/\n\ntheorem Dummit_Foote_exercise_2_4_16a {G : Type*} [Group G] [Fintype G] {H : Subgroup G}\n  (hH : H ≠ ⊤) :\n  ∃ M : Subgroup G, M ≠ ⊤ ∧\n  (∀ K : Subgroup G, M ≤ K → K = M ∨ K = ⊤) ∧\n  H ≤ M := by\n  sorry\n"}, {"index": 223, "category": "not_exact_not_faithful", "label": "incomparable", "error_type": "misunderstanding_of_informal_statement", "provability": "false", "reasoning": "The original formalization differs from the corrected/informal statement in multiple significant ways: (1) The ∃ quantifier's scope extends past the ↔ in Lean 4, so the original actually asserts \"∃ p : ZMo bsets, not only open ones).\n\nCounterexample showing the original is provably false: Take X = Y = ℝ, A = {0} ⊂ ℝ. Let U = Set.univ : Set ↥A, which is open in ↥A. Then `Subtype.val '' U = {0} ⊂ ℝ` which is not open. So the biconditional fails.\n\nThe original is incomparable to the informal claim (doesn't imply it, isn't implied by it). The author misread what \"the topology A inherits as subspace of Y equals topology as subspace of X\" requires — they wrote a characterization that describes open embeddings instead of topology-equality/inducing.", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\n/-Informal Statement\n\nShow that if $Y$ is a subspace of $X$, and $A$ is a subset of $Y$, then the topology $A$ inherits as a subspace of $Y$ is the same as the topology it inherits as a subspace of $X$.\n-/\n\ntheorem Munkres_exercise_16_1 {X : Type*} [TopologicalSpace X]\n  (Y : Set X)\n  (A : Set Y) :\n  ∀ U : Set A, IsOpen U ↔ IsOpen (Subtype.val '' U) := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace Topology\nopen scoped Topology\n\n\n\n/-Informal Statement\n\nShow that if $Y$ is a subspace of $X$, and $A$ is a subset of $Y$, then the topology $A$ inherits as a subspace of $Y$ is the same as the topology it inherits as a subspace of $X$.\n-/\n\ntheorem Munkres_exercise_16_1 {X : Type*} [TopologicalSpace X]\n    (Y : Set X) (A : Set Y) :\n    IsInducing (fun a : A => (a : X)) := by\n  sorry\n"}, {"index": 295, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "misunderstanding_of_informal_statement", "provability": "false", "reasoning": "The informal statement asserts that the specific collection of all rational open boxes is a basis for ℝ². The CORRECTED formalization captures this by explicitly constructing the set via Set.image2 over all Ioo intervals with rational endpoints. The ORIGINAL instead quantifies over an arbitrary set S with only the hypothesis ovability": "true", "reasoning": "The theorem statements in the ORIGINAL and CORRECTED formalizations are literally identical. Both state: given topological spaces X and Y, where Y has a LinearOrder and OrderTopology, and given continuous functions f, g : X → Y, the set {x | f x ≤ g x} is closed in X. This faithfully captures the informal statement from Munkres. The only differences are in the file preamble: the original uses `open Topology` (vs `open scoped Topology`) and declares `noncomputable section`, but these do not affect the semantic content of the theorem itself. This is exactly Mathlib's `isClosed_le` theorem, which is provably true.", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\n/-Informal Statement\n\nLet $Y$ be an ordered set in the order topology. Let $f, g: X \\rightarrow Y$ be continuous. Show that the set $\\{x \\mid f(x) \\leq g(x)\\}$ is closed in $X$.\n-/\n\ntheorem Munkres_exercise_18_8a {X Y : Type*} [TopologicalSpace X] [TopologicalSpace Y]\n  [LinearOrder Y] [OrderTopology Y] {f g : X → Y}\n  (hf : Continuous f) (hg : Continuous g) :\n  IsClosed {x | f x ≤ g x} := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen scoped Topology\n\n\n\n/-Informal Statement\n\nLet $Y$ be an ordered set in the order topology. Let $f, g: X \\rightarrow Y$ be continuous. Show that the set $\\{x \\mid f(x) \\leq g(x)\\}$ is closed in $X$.\n-/\n\ntheorem Munkres_exercise_18_8a {X Y : Type*} [TopologicalSpace X] [TopologicalSpace Y]\n  [LinearOrder Y] [OrderTopology Y] {f g : X → Y}\n  (hf : Continuous f) (hg : Continuous g) :\n  IsClosed {x | f x ≤ g x} := by\n  sorry\n"}, {"index": 297, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "missing_premise", "provability": "false", "reasoning": "The informal statement asserts uniqueness of continuous extensions: if g and g' both extend f continuously from A to closure A (with Y Hausdorff), then g = n\n\n\n/-Informal Statement\n\nLet $p: X \\rightarrow Y$ be a continuous map. Show that if there is a continuous map $f: Y \\rightarrow X$ such that $p \\circ f$ equals the identity map of $Y$, then $p$ is a quotient map.\n-/\n\ntheorem Munkres_exercise_22_2a {X Y : Type*} [TopologicalSpace X]\n  [TopologicalSpace Y] (p : X → Y) (h : Continuous p) :\n  (∃ (f : Y → X), Continuous f ∧ p ∘ f = id) → IsQuotientMap p := by\n  sorry\n"}, {"index": 301, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "misunderstanding_of_informal_statement", "provability": "true", "reasoning": "The informal statement asks to show the restricted map q : A → p(A) is open — the codomain is p(A) with its subspace topology. The corrected formalization uses `Set.MapsTo.restrict p A (p '' A) (Set.mapsTo_image p A)` which has type `↥A → ↥(p '' A)`, correctly capturing the restricted codomain. The original uses `p ∘ Subtype.val : A → Y`, which maps into the full space Y rather than the restricted codomain p(A). IsOpenMap for A → Y means: for open U ⊆ A, p(U) is open in Y. IsOpenMap for A → p(A) means: for open U ⊆ A, p(U) is open in the subspace p(A). The former implies the latter (since p(A) is open in Y under the given hypotheses, making openness in Y equivalent to openness in the subspace), but the original proves a strictly stronger statement than what the informal asks — it proves openness in the ambient space Y rather than in the restricted codomain p(A). The formalization doesn't match the informal's stated target.", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\n/-Informal Statement\n\nLet $p \\colon X \\rightarrow Y$ be an open map. Show that if $A$ is open in $X$, then the map $q \\colon A \\rightarrow p(A)$ obtained by restricting $p$ is an open map.\n-/\n\ntheorem Munkres_exercise_22_5 {X Y : Type*} [TopologicalSpace X]\n  [TopologicalSpace Y] (p : X → Y) (hp : IsOpenMap p)\n  (A : Set X) (hA : IsOpen A) : IsOpenMap (p ∘ Subtype.val : A → Y) := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen scoped Topology\n\n\n\n/-Informal Statement\n\nLet $p \\colon X \\rightarrow Y$ be an open map. Show that if $A$ is open in $X$, then the map $q \\colon A \\rightarrow p(A)$ obtained by restricting $p$ is an open map.\n-/\n\ntheorem Munkres_exercise_22_5 {X Y : Type*} [TopologicalSpace X]\n  [TopologicalSpace Y] (p : X → Y) (hp : IsOpenMap p)\n  (A : Set X) (hA : IsOpen A) :\n  IsOpenMap (Set.MapsTo.restrict p A (p '' A) (Set.mapsTo_image p A)) := by\n  sorry\n"}, {"index": 302, "category": "not_exact_not_faithful", "label": "weaker", "error_type": "misunderstanding_of_informal_statement", "provability": "true", "reasoning": "The informal statement uses $\\{A_\\alpha\\}$ to denote a collection indexed by an arbitrary (unspecified) index set α. The CORRECTED formalization reflects this by introducing a general type `α` and taking `A : α → Set X`. The ORIGINAL formalization restricts the index set to ℕ (`A : ℕ → Set X`), which makes it strictly weaker than the informal claim — the informal claim implies the ℕ-indexed case, but the ℕ-indexed case does not imply the general claim (it says nothing about, e.g., uncountable collections). The restricted ℕ-indexed statement is still mathematically true (provable as a special case of the general theorem, e.g., via Mathlib's connected union lemmas). The error is a misreading of the informal statement's arbitrary index set as specifically ℕ. (The duplicated `[TopologicalSpace X]` instance in the original is redundant but not semantically incorrect.)", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\n/-Informal Statement\n\nLet $\\left\\{A_{\\alpha}\\right\\}$ be a collection of connected subspaces of $X$; let $A$ be a connected subset of $X$. Show that if $A \\cap A_{\\alpha} \\neq \\varnothing$ for all $\\alpha$, then $A \\cup\\left(\\bigcup A_{\\alpha}\\right)$ is connected.\n-/\n\ntheorem Munkres_exercise_23_3 {X : Type*} [TopologicalSpace X]\n  [TopologicalSpace X] {A : ℕ → Set X}\n  (hAn : ∀ n, IsConnected (A n))\n  (A₀ : Set X)\n  (hA : IsConnected A₀)\n  (h : ∀ n, A₀ ∩ A n ≠ ∅) :\n  IsConnected (A₀ ∪ (⋃ n, A n)) := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen scoped Topology\n\n\n\n/-Informal Statement\n\nLet $\\left\\{A_{\\alpha}\\right\\}$ be a collection of connected subspaces of $X$; let $A$ be a connected subset of $X$. Show that if $A \\cap A_{\\alpha} \\neq \\varnothing$ for all $\\alpha$, then $A \\cup\\left(\\bigcup A_{\\alpha}\\right)$ is connected.\n-/\n\ntheorem Munkres_exercise_23_3 {X α : Type*} [TopologicalSpace X]\n  {A : α → Set X}\n  (hAa : ∀ a, IsConnected (A a))\n  (A₀ : Set X)\n  (hA : IsConnected A₀)\n  (h : ∀ a, A₀ ∩ A a ≠ ∅) :\n  IsConnected (A₀ ∪ (⋃ a, A a)) := by\n  sorry\n"}, {"index": 303, "category": "exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "The two formalizations have identical theorem statements: same implicit type X with TopologicalSpace instance, same sets A, C, same hypotheses (IsConnected C, C ∩ A ≠ ∅, C ∩ Aᶜ ≠ ∅), and same conclusion (C ∩ frontier A ≠ ∅). The only differences are in the preamble: original uses `open Topology` vs corrected's `open scoped Topology`, and original has `noncomputable section`. These preamble differences do not affect the semantic meaning of the theorem statement. The `frontier` in Mathlib (defined in Mathlib/Topology/Defs/Basic.lean) correctly corresponds to Munkres's boundary operator Bd A. The complement Aᶜ in Set X is semantically identical to X-A. The informal statement is a standard true theorem from Munkres's topology textbook (Exercise 23.6). Therefore the original is faithful, provable, and has no error.", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\n/-Informal Statement\n\nLet $A \\subset X$. Show that if $C$ is a connected subspace of $X$ that intersects both $A$ and $X-A$, then $C$ intersects $\\operatorname{Bd} A$.\n-/\n\ntheorem Munkres_exercise_23_6 {X : Type*}\n  [TopologicalSpace X] {A C : Set X} (hc : IsConnected C)\n  (hCA : C ∩ A ≠ ∅) (hCXA : C ∩ Aᶜ ≠ ∅) :\n  C ∩ (frontier A) ≠ ∅ := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen scoped Topology\n\n\n\n/-Informal Statement\n\nLet $A \\subset X$. Show that if $C$ is a connected subspace of $X$ that intersects both $A$ and $X-A$, then $C$ intersects $\\operatorname{Bd} A$.\n-/\n\ntheorem Munkres_exercise_23_6 {X : Type*}\n  [TopologicalSpace X] {A C : Set X} (hc : IsConnected C)\n  (hCA : C ∩ A ≠ ∅) (hCXA : C ∩ Aᶜ ≠ ∅) :\n  C ∩ (frontier A) ≠ ∅ := by\n  sorry\n"}, {"index": 304, "category": "exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "The informal statement is a standard theorem from Munkres (Exercise 23.11): if p: X → Y is a quotient map where Y is connected and each fiber p⁻¹({y}) is connected, then X is connected. This is mathematically true and unambiguous.\n\nComparing the ORIGINAL and CORRECTED formalizations line by line, the theorem signatures are identical:\n- Same type parameters `{X Y : Type*}` with `[TopologicalSpace X] [TopologicalSpace Y]`\n- Same function `(p : X → Y)` with `(hq : IsQuotientMap p)`\n- Same hypotheses: `(hY : ConnectedSpace Y)` and `(hX : ∀ y : Y, IsConnected (p ⁻¹' {y}))`\n- Same conclusion: `ConnectedSpace X`\n\nAll Mathlib APIs used are valid: `IsQuotientMap` (defined in Topology/Defs/Induced.lean), `IsConnected` (defined in Topology/Connected/Basic.lean), and `ConnectedSpace` (also in Topology/Connected/Basic.lean). The only differences between the files are cosmetic: the original has `noncomputable section` and separates `open Topology` onto a separate line, while the corrected includes `Topology` in the same open statement. These differences do not affect the theorem's meaning. The original formalization is faithful to the informal statement.", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\n/-Informal Statement\n\nLet $p: X \\rightarrow Y$ be a quotient map. Show that if each set $p^{-1}(\\{y\\})$ is connected, and if $Y$ is connected, then $X$ is connected.\n-/\n\ntheorem Munkres_exercise_23_11 {X Y : Type*} [TopologicalSpace X] [TopologicalSpace Y]\n  (p : X → Y) (hq : IsQuotientMap p)\n  (hY : ConnectedSpace Y) (hX : ∀ y : Y, IsConnected (p ⁻¹' {y})) :\n  ConnectedSpace X := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace Topology\n\n\n\n/-Informal Statement\n\nLet $p: X \\rightarrow Y$ be a quotient map. Show that if each set $p^{-1}(\\{y\\})$ is connected, and if $Y$ is connected, then $X$ is connected.\n-/\n\ntheorem Munkres_exercise_23_11 {X Y : Type*} [TopologicalSpace X] [TopologicalSpace Y]\n  (p : X → Y) (hq : IsQuotientMap p)\n  (hY : ConnectedSpace Y) (hX : ∀ y : Y, IsConnected (p ⁻¹' {y})) :\n  ConnectedSpace X := by\n  sorry\n"}, {"index": 305, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "adding_extra_case", "provability": "false", "reasoning": "The informal statement is the 1D Brouwer fixed point theorem (continuous self-map of [0,1] has a fixed point), which is classically true and unambiguous. The CORRECTED formalization uses `I : Set ℝ := Icc 0 1`, relying on canonical Mathlib instances: `Subtype.topologicalSpace` for `TopologicalSpace ↥I` (subspace topology from ℝ) and the `compactSpace_Icc` instance for `CompactSpace ↥I`. Under these canonical instances, `Continuous f` means continuity w.r.t. the standard topology, and the theorem is true. The ORIGINAL adds `[TopologicalSpace I] [CompactSpace I]` as explicit instance binders. In Lean 4, local instance binders take priority over globally registered instances during typeclass resolution, so `Continuous f` in the original refers to continuity w.r.t. the abstract topology instance. This universally quantifies the theorem over all possible compact topologies on I. This makes the original strictly stronger than informal (original ⟹ informal by instantiating with subspace topology, but not conversely). However, the stronger statement is FALSE: take the indiscrete topology on I (which is compact), and f(x) = x + 1/2 mod 1 — every function is continuous under indiscrete topology, and this f has no fixed point. The error is adding extra instance hypotheses not in the informal statement, which inadvertently generalizes the theorem to a false statement.", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\nabbrev I : Set ℝ := Icc 0 1\n\n/-Informal Statement\n\nLet $f \\colon X \\rightarrow X$ be continuous. Show that if $X = [0, 1]$, there is a point $x$ such that $f(x) = x$. (The point $x$ is called a fixed point of $f$.)\n-/\n\ntheorem Munkres_exercise_24_3a [TopologicalSpace I] [CompactSpace I]\n  (f : I → I) (hf : Continuous f) :\n  ∃ (x : I), f x = x := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen scoped Topology\n\nabbrev I : Set ℝ := Icc 0 1\n\n/-Informal Statement\n\nLet $f \\colon X \\rightarrow X$ be continuous. Show that if $X = [0, 1]$, there is a point $x$ such that $f(x) = x$. (The point $x$ is called a fixed point of $f$.)\n-/\n\ntheorem Munkres_exercise_24_3a (f : I → I) (hf : Continuous f) :\n  ∃ (x : I), f x = x := by\n  sorry\n"}, {"index": 306, "category": "not_exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "The informal statement is a classical result from Munkres on topological groups: the connected component of the identity is a normal subgroup. Comparing the two formalizations: (1) `connectedComponent 1` in the original is elaborated the same as `connectedComponent (1 : G)` in the corrected — `1` is forced to have type `G` by `connectedComponent`'s expected argument type. (2) `open Topology` vs `open scoped Topology` is a notation-scoping difference with no semantic effect. (3) The critical comparison is `C' = C` (where `C' : Subgroup G`, `C : Set G`) vs `(H : Set G) = C`. From Mathlib's `Data/SetLike/Basic.lean:118`, there is `instance : CoeTC A (Set B) where coe := SetLike.coe`, so `Subgroup G` coerces to `Set G`. When Lean elaborates `C' = C` with mismatched types and a `CoeTC` available, the coercion is inserted automatically, yielding `(↑C' : Set G) = C` — identical to the corrected version. Both theorems assert: there exists a subgroup of G whose underlying set is C and which is normal. The corrected version just makes the coercion explicit for clarity. The two are logically equivalent, so the original is faithful.", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\n/-Informal Statement\n\nLet $G$ be a topological group; let $C$ be the component of $G$ containing the identity element $e$. Show that $C$ is a normal subgroup of $G$.\n-/\n\ntheorem Munkres_exercise_25_9 {G : Type*} [TopologicalSpace G] [Group G]\n  [IsTopologicalGroup G] (C : Set G) (h : C = connectedComponent 1) :\n  ∃ C' : Subgroup G, C' = C ∧ C'.Normal := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen scoped Topology\n\n\n\n/-Informal Statement\n\nLet $G$ be a topological group; let $C$ be the component of $G$ containing the identity element $e$. Show that $C$ is a normal subgroup of $G$.\n-/\n\ntheorem Munkres_exercise_25_9 {G : Type*} [TopologicalSpace G] [Group G]\n  [IsTopologicalGroup G] (C : Set G) (hC : C = connectedComponent (1 : G)) :\n  ∃ H : Subgroup G, (H : Set G) = C ∧ H.Normal := by\n  sorry\n"}, {"index": 307, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "missing_premise", "provability": "false", "reasoning": "The informal statement describes a perfect map, which requires p to be closed, continuous, surjective, with compact fibers. The ORIGINAL formalization omits the `IsClosedMap p` hypothesis that is present in the CORRECTED version. The informal statement explicitly says \"closed continuous surjective map\", so the closed map condition is an explicit premise, not implicit. Without this hypothesis, the statement becomes false: Take X = ℕ ∪ {*} with the discrete topology (not compact), Y = ℕ ∪ {∞} the one-point compactification (compact), and p sending n ↦ n and * ↦ ∞. Then p is continuous (X is discrete), surjective, all fibers are singletons (hence compact), Y is compact, but X is not compact. The map p is not closed (ℕ is closed in X but its image is not closed in Y). Since the ORIGINAL has fewer hypotheses and the same conclusion, it asserts more than the informal statement — it is stronger. But it is provably false, as the counterexample shows. The error is a missing explicit premise (IsClosedMap p).", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\n/-Informal Statement\n\nLet $p: X \\rightarrow Y$ be a closed continuous surjective map such that $p^{-1}(\\{y\\})$ is compact, for each $y \\in Y$. (Such a map is called a perfect map.) Show that if $Y$ is compact, then $X$ is compact.\n-/\n\ntheorem Munkres_exercise_26_12 {X Y : Type*} [TopologicalSpace X] [TopologicalSpace Y]\n  (p : X → Y) (h : Function.Surjective p) (hc : Continuous p) (hp : ∀ y, IsCompact (p ⁻¹' {y}))\n  (hY : CompactSpace Y) : CompactSpace X := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen scoped Topology\n\n\n\n/-Informal Statement\n\nLet $p: X \\rightarrow Y$ be a closed continuous surjective map such that $p^{-1}(\\{y\\})$ is compact, for each $y \\in Y$. (Such a map is called a perfect map.) Show that if $Y$ is compact, then $X$ is compact.\n-/\n\ntheorem Munkres_exercise_26_12 {X Y : Type*} [TopologicalSpace X] [TopologicalSpace Y]\n  (p : X → Y) (h : Function.Surjective p) (hc : Continuous p)\n  (hp : IsClosedMap p) (hp : ∀ y, IsCompact (p ⁻¹' {y}))\n  (hY : CompactSpace Y) : CompactSpace X := by\n  sorry\n"}, {"index": 308, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "misunderstanding_of_mathlib", "provability": "false", "reasoning": "The informal statement (Munkres Thm 28.2) is a well-known true theorem and is unambiguous: for T_1 spaces, countable compactness is equivalent to limit point compactness (every infinite subset has a limit/accumulation point).\n\nThe ORIGINAL defines `limit_point_compact X := ∀ U, Infinite U → ∃ x ∈ U, ClusterPt x (𝓟 U)`. In Mathlib, `ClusterPt x (𝓟 U)` is equivalent to `x ∈ closure U` (verified via `mem_closure_iff_clusterPt` and `clusterPt_principal_iff`: `∀ V ∈ 𝓝 x, (V ∩ U).Nonempty`). When `x ∈ U`, this is trivially satisfied because `x ∈ V ∩ U` for every neighborhood V of x. Therefore the original `limit_point_compact X` reduces to `∀ U, Infinite U → U.Nonempty`, which is a tautology holding in every topological space.\n\nConsequently, the original theorem claims `countably_compact X ↔ True` for every T_1 space X, i.e., every T_1 space is countably compact. This is FALSE: ℝ with the standard topology is T_1 but not countably compact (the cover by (-n, n) has no finite subcover).\n\nThe CORRECTED version uses `ClusterPt x (𝓟 (U \\ {x}))`, which by Mathlib's `accPt_principal_iff_clusterPt` is equivalent to `AccPt x (𝓟 U)` — the genuine topological notion of \"x is a limit point of U\" (every neighborhood contains a point of U distinct from x). This correctly encodes Munkres's definition.\n\nThe error is a confusion between Mathlib's `ClusterPt` (which corresponds to \"x is in the closure\") and `AccPt` (which corresponds to the classical \"limit point / accumulation point\"). Writing `ClusterPt x (𝓟 U)` with the qualifier `x ∈ U` trivializes the property rather than stating limit point compactness. This is a misunderstanding of the Mathlib API: limit points in the classical sense should be encoded via `AccPt` or equivalently `ClusterPt x (𝓟 (U \\ {x}))`.\n\nQ2: incomparable — the original is a trivially-true-inner-property yielding a false biconditional, while the corrected expresses the correct nontrivial equivalence.\nQ3: false — the original universally-quantified theorem fails on ℝ.\nQ4: misunderstanding_of_mathlib — ClusterPt vs AccPt confusion.", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\ndef countably_compact (X : Type*) [TopologicalSpace X] :=\n  ∀ U : ℕ → Set X,\n  (∀ i, IsOpen (U i)) ∧ ((univ : Set X) ⊆ ⋃ i, U i) →\n  (∃ t : Finset ℕ, (univ : Set X) ⊆ ⋃ i ∈ t, U i)\n\ndef limit_point_compact (X : Type*) [TopologicalSpace X] :=\n  ∀ U : Set X, Infinite U → ∃ x ∈ U, ClusterPt x (𝓟 U)\n\n/-Informal Statement\n\nA space $X$ is said to be countably compact if every countable open covering of $X$ contains a finite subcollection that covers $X$. Show that for a $T_1$ space $X$, countable compactness is equivalent to limit point compactness.\n-/\n\ntheorem Munkres_exercise_28_4 {X : Type*}\n  [TopologicalSpace X] (hT1 : T1Space X) :\n  countably_compact X ↔ limit_point_compact X := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen scoped Topology\n\ndef countably_compact (X : Type*) [TopologicalSpace X] :=\n  ∀ U : ℕ → Set X,\n  (∀ i, IsOpen (U i)) ∧ ((univ : Set X) ⊆ ⋃ i, U i) →\n  (∃ t : Finset ℕ, (univ : Set X) ⊆ ⋃ i ∈ t, U i)\n\ndef limit_point_compact_strong (X : Type*) [TopologicalSpace X] :=\n  ∀ U : Set X, Infinite U → ∃ x, ClusterPt x (𝓟 (U \\ {x}))\n\n/-Informal Statement\n\nA space $X$ is said to be countably compact if every countable open covering of $X$ contains a finite subcollection that covers $X$. Show that for a $T_1$ space $X$, countable compactness is equivalent to limit point compactness.\n-/\n\n\ntheorem Munkres_exercise_28_4 {X : Type*} [TopologicalSpace X]\n    (hT1 : T1Space X) : countably_compact X ↔ limit_point_compact_strong X := by\n  sorry\n"}, {"index": 309, "category": "not_exact_not_faithful", "label": "weaker", "error_type": "misunderstanding_of_informal_statement", "provability": "true", "reasoning": "The informal statement asks to show both that f is bijective AND that f is a homeomorphism. In Mathlib, `IsHomeomorph` is defined as the conjunction of `Continuous f`, `IsOpenMap f`, and `Bijective f` (verified in Mathlib/Topology/Homeomorph/Defs.lean). The corrected formalization captures exactly this: `Continuous f ∧ Bijective f ∧ IsOpenMap f`. The original formalization only asks for `Function.Bijective f`, dropping the \"hence a homeomorphism\" conclusion entirely. This makes the original strictly weaker than the informal statement — it proves less than what was asked. The original statement is still provably true (isometries on compact metric spaces are bijective, since they are injective by definition and continuous maps from compact spaces to Hausdorff spaces whose images are closed/compact). The error is a misunderstanding of what the informal statement demands as a conclusion: the formalizer missed the second part of the conclusion (the homeomorphism claim, which in Mathlib requires continuity and the open map property in addition to bijectivity).", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\n/-Informal Statement\n\nLet $(X, d)$ be a metric space. If $f: X \\rightarrow X$ satisfies the condition $d(f(x), f(y))=d(x, y)$ for all $x, y \\in X$, then $f$ is called an isometry of $X$. Show that if $f$ is an isometry and $X$ is compact, then $f$ is bijective and hence a homeomorphism.\n-/\n\ntheorem Munkres_exercise_28_6 {X : Type*} [MetricSpace X]\n  [CompactSpace X] {f : X → X} (hf : Isometry f) :\n  Function.Bijective f := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace Function\nopen scoped Topology\n\n\n\n/-Informal Statement\n\nLet $(X, d)$ be a metric space. If $f: X \\rightarrow X$ satisfies the condition $d(f(x), f(y))=d(x, y)$ for all $x, y \\in X$, then $f$ is called an isometry of $X$. Show that if $f$ is an isometry and $X$ is compact, then $f$ is bijective and hence a homeomorphism.\n-/\n\ntheorem Munkres_exercise_28_6 {X : Type*} [MetricSpace X]\n  [CompactSpace X] {f : X → X} (hf : Isometry f) :\n  Continuous f ∧ Bijective f ∧ IsOpenMap f := by\n  sorry\n"}, {"index": 310, "category": "not_exact_not_faithful", "label": "incomparable", "error_type": "misunderstanding_of_mathlib", "provability": "false", "reasoning": "The informal statement (Munkres 29.4) is a standard, true, and unambiguous theorem: [0,1]^ω is not locally compact in the uniform topology (metric ρ(x,y) = sup_n |x_n - y_n|). The CORRECTED version uses `ℕ →ᵇ I` (BoundedContinuousFunction), which Mathlib equips with the uniform metric `dist f g = ⨆ x, dist (f x) (g x)` — this correctly encodes the uniform topology on [0,1]^ω (since ℕ is discrete and I is bounded, every function is continuous and bounded). The ORIGINAL version uses `ℕ → I` with a generic `[TopologicalSpace (ℕ → I)]` hypothesis. This fails to encode the uniform topology: the hypothesis is universally quantified, so the statement asserts \"for every topology on ℕ → I, the space is not locally compact\" — which is mathematically false (e.g., with the indiscrete topology or even Pi.topologicalSpace via Tychonoff, the space is compact hence locally compact). The types and quantification structures differ fundamentally, making the two statements incomparable. The error is a misunderstanding of Mathlib's API: the idiomatic way to express the uniform topology on ℕ → I is via `ℕ →ᵇ I` or `UniformFun ℕ I`, not via a generic TopologicalSpace hypothesis on the plain function type.", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\nabbrev I : Set ℝ := Icc 0 1\n\n/-Informal Statement\n\nShow that $[0, 1]^\\omega$ is not locally compact in  countable dense subset.\n-/\n\ntheorem Munkres_exercise_30_10\n  {X : ℕ → Type*} [∀ i, TopologicalSpace (X i)]\n  (h : ∀ i, ∃ (s : Set (X i)), Countable s ∧ Dense s) :\n  ∃ (s : Set (Π i, X i)), Countable s ∧ Dense s := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen scoped Topology\n\n\n\n/-Informal Statement\n\nShow that if $X$ is a countable product of spaces having countable dense subsets, then $X$ has a countable dense subset.\n-/\n\ntheorem Munkres_exercise_30_10\n  {X : ℕ → Type*} [∀ i, TopologicalSpace (X i)]\n  (h : ∀ i, ∃ (s : Set (X i)), Countable s ∧ Dense s) :\n  ∃ (s : Set (Π i, X i)), Countable s ∧ Dense s := by\n  sorry\n"}, {"index": 312, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "missing_implicit_premise", "provability": "false", "reasoning": "The informal statement is from Munkres Exercise 31.1. In Munkres's convention, \"regular\" includes T1 (one-point sets closed), and \"pair of points\" implicitly means distinct points. The informal statement is true and unambiguous under these standard Munkres conventions.\n\nThe ORIGINAL formalization has two issues:\n1. It uses Mathlib's `RegularSpace` without `T1Space`. Mathlib's `RegularSpace` alone does not include T1 (verified in Mathlib/Topology/Separation/Regular.lean line 79: it only asserts the regularity axiom for closed sets and points). Munkres's \"regular\" corresponds to `RegularSpace + T1Space` (essentially T3).\n2. It is missing the hypothesis `x ≠ y`.\n\nThe original is STRONGER than the corrected: it has weaker hypotheses (no T1) and a stronger conclusion (includes the x = y case), so the original implies the corrected.\n\nThe original is PROVABLY FALSE: when x = y, for any neighborhoods U ∋ x and V ∋ x, we have x ∈ closure U ∩ closure V, so the intersection cannot be empty. Additionally, without T1, indiscrete-like spaces provide counterexamples where closures of any non-empty open set equal the whole space.\n\nError type: both the T1 premise (implicit in Munkres's definition of \"regular\") and the `x ≠ y` premise (implicit in \"pair of points\") are missing implicit premises.", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\n/-Informal Statement\n\nShow that if $X$ is regular, every pair of points of $X$ have neighborhoods whose closures are disjoint.\n-/\n\ntheorem Munkres_exercise_31_1 {X : Type*} [TopologicalSpace X]\n  (hX : RegularSpace X) (x y : X) :\n  ∃ (U V : Set X), IsOpen U ∧ IsOpen V ∧ x ∈ U ∧ y ∈ V ∧ closure U ∩ closure V = ∅ := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen scoped Topology\n\n/-Informal Statement\n\nShow that if $X$ is regular, every pair of points of $X$ have neighborhoods whose closures are disjoint.\n-/\n\ntheorem Munkres_exercise_31_1 {X : Type*} [TopologicalSpace X]\n    [RegularSpace X] [T1Space X]\n    (x y : X) (hxy : x ≠ y) :\n    ∃ U V : Set X, IsOpen U ∧ IsOpen V ∧ x ∈ U ∧ y ∈ V ∧\n      closure U ∩ closure V = (∅ : Set X) := by\n  sorry\n"}, {"index": 313, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "missing_implicit_premise", "provability": "false", "reasoning": "The informal statement (Munkres exercise 31.3) concerns the order topology, which in Munkres' textbook is defined on simply (linearly) ordered sets. So the intended premise is LinearOrder, as in the CORRECTED version. Mathlib indeed proves that a LinearOrder with OrderTopology is T5 (hence regular) via OrderTopology.t5Space, but this result requires [LinearOrder X] — not merely PartialOrder. The ORIGINAL weakens the premise to [PartialOrder α], which is strictly broader (LinearOrder ⟹ PartialOrder), so the original's claim implies the informal claim — making it 'stronger'. However, the stronger claim is false: counterexample — take α = {a, b, c} with only a < b (c incomparable to both). The order topology has open sets {∅, {a}, {b}, {a,b}, α}, so closed pe*} [∀ i, TopologicalSpace (X i)]\n  (h : ∀ i, Nonempty (X i)) (h2 : NormalSpace (Π i, X i)) :\n  ∀ i, NormalSpace (X i) := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen scoped Topology\n\n\n\n/-Informal Statement\n\nShow that if $\\prod X_\\alpha$ is normal, then so is $X_\\alpha$. Assume that each $X_\\alpha$ is nonempty.\n-/\n\ntheorem Munkres_exercise_32_2c\n  {ι : Type*} {X : ι → Type*} [∀ i, TopologicalSpace (X i)]\n  (h : ∀ i, Nonempty (X i)) (h2 : NormalSpace (Π i, X i)) :\n  ∀ i, NormalSpace (X i) := by\n  sorry\n"}, {"index": 316, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "misunderstanding_of_informal_statement", "provability": "false", "reasoning": "The informal statement is a true, standard theorem: every locally compact Hausdorff space is completely regular. Mathlib's `CompletelyRegularSpace` (as confirmed in `Mathlib/Topology/Separation/CompletelyRegular.lean`) is defined as: ∀ x, ∀ K closed, x ∉ K, ∃ f : X → I continuous with f x = 0 and EqOn f 1 K. The corrected formalization uses this definition directly.\n\nThe original formalization unfolds the definition but incorrectly: it writes `f '' A = {0}` instead of `EqOn f 0 A` (using the polarity-swapped form f x = 1). Set-image equality `f '' A = {0}` is strictly stronger than `EqOn f 0 A`: specifically, when A = ∅, we have `f '' ∅ = ∅ ≠ {0}`, so the condition is unsatisfiable.\n\nThe hypothesis `IsClosed A ∧ x ∉ A` is satisfied when A = ∅ for any x, so for any non-empty locally compact Hausdorff space X (e.g., ℝ), we must produce an f with `f '' ∅ = {0}`, which is impossible. Therefore the original theorem is provably false. The original is technically stronger than informal (false implies anything, and outside the A = ∅ pathology, it would imply the informal claim via f ↦ 1-f), but asserts an impossible additional condition.\n\nThis is a misunderstanding of how to formalize \"f is identically 0 on A\" — the author chose a set-equality formulation that fails for empty A, rather than using `EqOn` or a subset formulation.", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\nabbrev I : Set ℝ := Icc 0 1\n\n/-Informal Statement\n\nShow that every locally compact Hausdorff space is completely regular.\n-/\n\ntheorem Munkres_exercise_33_7 {X : Type*} [TopologicalSpace X]\n  (hX : LocallyCompactSpace X) (hX' : T2Space X) :\n  ∀ x A, IsClosed A ∧ ¬ x ∈ A →\n  ∃ (f : X → I), Continuous f ∧ f x = 1 ∧ f '' A = {0} := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen scoped Topology\n\n\n\n/-Informal Statement\n\nShow that every locally compact Hausdorff space is completely regular.\n-/\n\ntheorem Munkres_exercise_33_7 {X : Type*} [TopologicalSpace X]\n  (hX : LocallyCompactSpace X) (hX' : T2Space X) :\n  CompletelyRegularSpace X := by\n  sorry\n"}, {"index": 317, "category": "not_exact_not_faithful", "label": "stronger", "error_type": "missing_premise", "provability": "true", "reasoning": "The informal statement explicitly says \"compact Hausdorff space\", establishing Hausdorff as an explicit premise. The CORRECTED formalization includes [T2Space X] as an instance parameter, while the ORIGINAL omits it. This makes the ORIGINAL's hypothesis list strictly weaker, so as a formal theorem statement it is \"stronger\" — claiming the result for all compact spaces (not just Hausdorff ones) with such a closed cover. However, the ORIGINAL is still provable: Hausdorff can be derived from the remaining hypotheses via the diagonal argument. Since X = X_1 ∪ X_2 with X_1, X_2 closed and each Hausdorff (metrizable implies T2), one can show Δ_X ∩ (X_i × X_j) = Δ_{X_i ∩ X_j} is closed in X×X for all i,j (as X_i ∩ X_j is a Hausdorff subspace and closed in X). This makes Δ_X closed in X×X, so X is Hausdorff. Then the standard proof of the theorem applies. Additionally, MetrizableSpace X in Mathlib already implies T2Space X, so the c etely unconstrained. Whenever closure A ⊊ X (e.g., X = ℝ, A = {0}), there are uncountably many g : X → Y satisfying all three properties, so the ∃! claim fails. Counterexample: X = ℝ, A = {0}, f(0) = 0; any g : ℝ → ℝ with g(0) = 0 satisfies the properties, so uniqueness fails. The original is thus mathematically false in general. Since original ⟹ informal (restricting the unique g to closure A gives a unique extension) but not vice versa, the original is strictly stronger. The error is adding an extra conclusion (uniqueness over the entire domain X → Y rather than closure A → Y), which overspecifies beyond the informal statement.", "original": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen Topology\nnoncomputable section\n\n/-Informal Statement\n\nLet $(X, d_X)$ and $(Y, d_Y)$ be metric spaces; let $Y$ be complete. Let $A \\subset X$. Show that if $f \\colon A \\rightarrow Y$ is uniformly continuous, then $f$ can be uniquely extended to a continuous function $g \\colon \\bar{A} \\rightarrow Y$, and $g$ is uniformly continuous.\n-/\n\ntheorem Munkres_exercise_43_2 {X : Type*} [MetricSpace X]\n  {Y : Type*} [MetricSpace Y] [CompleteSpace Y] (A : Set X)\n  (f : X → Y) (hf : UniformContinuousOn f A) :\n  ∃! (g : X → Y), ContinuousOn g (closure A) ∧\n  UniformContinuousOn g (closure A) ∧ ∀ (x : A), g x = f x := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Set TopologicalSpace\nopen scoped Topology\n\n/-Informal Statement\n\nLet $(X, d_X)$ and $(Y, d_Y)$ be metric spaces; let $Y$ be complete. Let $A \\subset X$. Show that if $f \\colon A \\rightarrow Y$ is uniformly continuous, then $f$ can be uniquely extended to a continuous function $g \\colon \\bar{A} \\rightarrow Y$, and $g$ is uniformly continuous.\n-/\n\ntheorem Munkres_exercise_43_2 {X : Type*} [MetricSpace X]\n    {Y : Type*} [MetricSpace Y] [CompleteSpace Y] (A : Set X)\n    (f : X → Y) (hf : UniformContinuousOn f A) :\n    ∃ (g : closure A → Y),\n      UniformContinuous g ∧\n        (∀ ve 0, hence constant).", "original": "import Mathlib\n\nopen Filter Real Function\nopen scoped Topology\nnoncomputable section\n\n/-Informal Statement\n\nAssume that $f \\colon \\mathbb{R} \\rightarrow \\mathbb{R}$ satisfies $|f(t)-f(x)| \\leq|t-x|^{2}$ for all $t, x$. Prove that $f$ is constant.\n-/\n\ntheorem Pugh_exercise_3_1 {f : ℝ → ℝ}\n  (hf : ∀ x y, |f x - f y| ≤ |x - y| ^ 2) :\n  ∃ c, f = λ x => c := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Filter Real Function\nopen scoped Topology\n\n\n\n/-Informal Statement\n\nAssume that $f \\colon \\mathbb{R} \\rightarrow \\mathbb{R}$ satisfies $|f(t)-f(x)| \\leq|t-x|^{2}$ for all $t, x$. Prove that $f$ is constant.\n-/\n\ntheorem Pugh_exercise_3_1 {f : ℝ → ℝ}\n  (hf : ∀ x y, |f x - f y| ≤ |x - y| ^ 2) :\n  ∃ c, f = λ _x => c := by\n  sorry\n"}, {"index": 324, "category": "not_exact_not_faithful", "label": "incomparable", "error_type": "misunderstanding_of_informal_statement", "provability": "true", "reasoning": "The informal statement asks for convergence of the series ∑ 1/(k·(log k)^p) for p>1, which is the classical summability result. The CORRECTED formalization uses `Summable` with a (k+2) shift to avoid the undefined terms at k=0 (division by 0) and k=1 (log 1 = 0). The ORIGINAL formalization instead asserts `∃ l, Tendsto f atTop (𝓝 l)`, which states that the sequence of terms converges to some limit — a strictly weaker claim. Since summability of a real series implies its terms tend to 0, the corrected statement implies the original, making the original weaker (not faithful). The original statement is provably TRUE (the terms tend to 0 as k→∞, regardless of p, since 1/(k·(log k)^p) → 0 for any p with k ≥ 2, and the Lean-default values at k=0,1 are 0 due to division by zero conventions). The error is a misunderstanding of the informal statement: \"the series converges\" refers to summability of the series, not convergence of the sequence of terms.", "original": "import Mathlib\n\nopen Filter Real Funct
