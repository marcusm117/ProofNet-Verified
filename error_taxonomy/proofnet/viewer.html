∧ StrictMonoOn μ (Ioi 0) ∧ Tendsto μ (𝓝[>] 0) (𝓝 0) ∧\n  (∀ s t : Icc a b, |f s - f t| ≤ μ (|s - t|)) := by\n  sorry\n"}, {"index": 326, "category": "exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "Original and corrected formalizations are identical (modulo whitespace/formatting).", "original": "import Mathlib\n\nopen scoped BigOperators\n\n/-Informal Statement\n\nProve that, for any integers $a, b, c$, there exists a positive integer $n$ such that $\\sqrt{n^3+a n^2+b n+c}$ is not an integer.\n-/\n\ntheorem Putnam_exercise_1998_b6 (a b c : ℤ) :\n  ∃ n : ℤ, n > 0 ∧ ¬ ∃ m : ℤ, Real.sqrt (n^3 + a*n^2 + b*n + c) = m := by\n  sorry\n", "corrected": "import Mathlib\n\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nProve that, for any integers $a, b, c$, there exists a positive integer $n$ such that $\\sqrt{n^3+a n^2+b n+c}$ is not an integer.\n-/\n\n\ntheorem Putnam_exercise_1998_b6 (a b c : ℤ) :\n    ∃ n : ℤ, n > 0 ∧ ¬ ∃ m : ℤ, Real.sqrt (n^3 + a*n^2 + b*n + c) = m := by\n  sorry\n"}, {"index": 327, "category": "exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "The ORIGINAL and CORRECTED formalizations have identical theorem statements. The only differences are non-semantic: the CORRECTED adds `set_option maxHeartbeats 800000` (a compilation resource setting) and `open Filter Topology Set` (namespace imports). Both formalizations encode: f has continuous third derivative (ContDiff ℝ 3 f), f^(n)(x) > 0 for all n ≤ 3 and all x (covering f, f', f'', f''' positivity), f'''(x) ≤ f(x), and conclude f'(x) < 2f(x). This is a faithful encoding of the Putnam 1999 B4 problem. Since `iteratedDeriv 0 f = f`, `iteratedDeriv 1 f = deriv f`, etc., the use of `iteratedDeriv n f` with `n ≤ 3` correctly captures all four positivity conditions. The ORIGINAL is logically equivalent to the CORRECTED and faithful to the informal statement.", "original": "import Mathlib\n\nopen scoped BigOpe thlib\n\nopen scoped BigOperators\n\n/-Informal Statement\n\nProve that there are unique positive integers $a, n$ such that $a^{n+1}-(a+1)^n=2001$.\n-/\n\ntheorem Putnam_exercise_2001_a5 :\n  ∃! a : ℕ × ℕ, a.1 > 0 ∧ a.2 > 0 ∧ a.1^(a.2+1) - (a.1+1)^a.2 = 2001 := by\n  sorry\n", "corrected": "import Mathlib\n\nopen scoped BigOperators\n\n\n/-Informal Statement\n\nProve that there are unique positive integers $a, n$ such that $a^{n+1}-(a+1)^n=2001$.\n-/\n\n\ntheorem Putnam_exercise_2001_a5 :\n    ∃! p : ℕ × ℕ, p.1 > 0 ∧ p.2 > 0 ∧ p.1^(p.2 + 1) - (p.1 + 1)^(p.2) = 2001 := by\n  sorry\n"}, {"index": 329, "category": "not_exact_not_faithful", "label": "incomparable", "error_type": "misunderstanding_of_informal_statement", "provability": "false", "reasoning": "The informal statement defines P_n(x) = 1 + 2x + 3x² + ... + nx^(n-1), i.e., the coefficient of x^i is (i+1) for i = 0, ..., n-1. This is Putnam 2014 A5, a well-known true statement.\n\nThe CORRECTED formalization faithfully captures this: `∑ i : Fin n, (↑i + 1) * X ^ (↑i : ℕ)` sums `(i+1) * X^i`, and includes `0 < j` and `0 < k` (necessary because P_0 = 0 is not coprime with anything).\n\nThe ORIGINAL formalization has a fundamentally wrong polynomial definition: `∑ i : Fin n, (n+1) * X^n`. The summand `(n+1) * X^n` does not depend on the summation variable `i`, so this computes `n * (n+1) * X^n`, not P_n. For example, the original gives P_1 = 2X, P_2 = 6X², P_3 = 12X³, etc. — all monomials in X with no constant term, which are pairwise not coprime (they share the factor X). Additionally, P_0 = 0 with the original definition, and the hypothesis `∀ j k, j ≠ k → IsCoprime (P j) (P k)` includes j=0 or k=0 cases, making the statement provably false (IsCoprime 0 (2X) is false).\n\nThe polynomial definition mistake (using `n` instead of `i` in both the coefficient and exponent) is the primary error — it reflects a misreading of the informal statement's polynomial formula. The missing positivity premises and different coef iting ℝ as a disjoint union of bounded open intervals would require one of them to equal ℝ, which is impossible. The error type is misunderstanding of the informal statement — specifically, failing to recognize that \"segments\" must include unbounded intervals for the classical result to hold.", "original": "import Mathlib\n\nopen Topology Filter Real Complex TopologicalSpace Finset\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nProve that every open set in $\\mathbb{R}$ is the union of an at most countable collection of disjoint segments.\n-/\n\ntheorem Rudin_exercise_2_29 (U : Set ℝ) (hU : IsOpen U) :\n  ∃ (f : ℕ → Set ℝ), (∀ n, ∃ a b : ℝ, f n = {x | a < x ∧ x < b}) ∧ (∀ n, f n ⊆ U) ∧\n  (∀ n m, n ≠ m → f n ∩ f m = ∅) ∧\n  U = ⋃ n, f n := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Topology Filter Real Complex TopologicalSpace Finset Set\nopen scoped BigOperators\n\n/-Informal Statement\n\nProve that every open set in $\\mathbb{R}$ is the union of an at most countable collection of disjoint segments.\n-/\n\ntheorem Rudin_exercise_2_29 (U : Set ℝ) (hU : IsOpen U) :\n  ∃ (f : ℕ → Set ℝ),\n    (∀ n, ∃ a b : EReal, f n = {x : ℝ | a < (x : EReal) ∧ (x : EReal) < b}) ∧\n    (∀ n, f n ⊆ U) ∧\n    (∀ n m, n ≠ m → f n ∩ f m = ∅) ∧\n    U = ⋃ n, f n := by\n  sorry\n"}, {"index": 342, "category": "not_exact_not_faithful", "label": "nl_ambiguous", "error_type": "nl_ambiguous", "provability": "true", "reasoning": "The original informal statement says 'Prove that lim_{n→∞} √(n²+n) − n = 1/2' without specifying the domain of n. The corrected NL adds 'for the real function f(n) = √(n²+n) − n' to clarify n ∈ ℝ. Without this clarification, n could be interpreted as ranging over ℕ (discrete sequence) or ℝ (continuous limit), which are different mathematical statements with different formalizations (Filter.atTop on ℕ vs ℝ). The formal uses `n : ℝ`, which is one valid interpretation but the informal was ambiguous about this. The formal statements a n : EReal)) + limsup (fun n => (b n : EReal)) := by\n  sorry\n"}, {"index": 344, "category": "not_exact_not_faithful", "label": "incomparable", "error_type": "misunderstanding_of_informal_statement", "provability": "true", "reasoning": "The informal statement asserts that if a_n ≥ 0 and Σa_n converges, then Σ √(a_n)/n converges. The CORRECTED formalization faithfully encodes this as the series Σ_{i∈range n} sqrt(a i)/(i+1) with the nonnegativity premise hnneg. The ORIGINAL has two errors: (1) it drops the nonnegativity premise a_n ≥ 0, and (2) crucially, in the conclusion λ n => ∑ i ∈ range n, sqrt(a i)/n, the 'n' in the denominator is bound by the OUTER lambda (the partial sum upper bound), not the summation index 'i'. This makes the ORIGINAL's conclusion express (1/n)·∑_{i<n} √(a_i), which is a Cesaro mean rather than the intended series with 1/(i+1) weights. The ORIGINAL's statement is incomparable to the informal: different conclusion (Cesaro mean vs weighted series) and weaker premise (no nonneg). However, the ORIGINAL theorem happens to be provable: convergence of Σa_i implies a_i → 0, hence √(a_i) → 0 (Real.sqrt is continuous at 0 and maps negatives to 0), and by Cesaro's theorem the mean → 0. The primary error is misunderstanding how to translate the informal expression √(a_n)/n — the writer misidentified which variable corresponds to 'n' in the formula.", "original": "import Mathlib\n\nopen Topology Filter Real TopologicalSpace Finset\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nProve that the convergence of $\\Sigma a_{n}$ implies the convergence of $\\sum \\frac{\\sqrt{a_{n}}}{n}$ if $a_n\\geq 0$.\n-/\n\ntheorem Rudin_exercise_3_7\n  (a : ℕ → ℝ)\n  (h : ∃ y, (Tendsto (λ n => (∑ i ∈ (range n), a i)) atTop (𝓝 y))) :\n  ∃ y, Tendsto (λ n => (∑ i ∈ (range n), sqrt (a i) / n)) atTop (𝓝 y) := by\n  sorry\n", "corrected": "import Mathlib\nopen Topology Filter Real TopologicalSpace Finset\nopen scoped BigOperators\n\n\n\n/-Informal Statement\n\nProve that the convergence of $\\Sigma a_{n}$ implies the convergence of $\\sum \\frac{\\sqrt{a_{n}}}{n}$ if $a_n\\geq 0$.\n-/\n\ntheorem Rudin_exercise_3_7\n  (a : ℕ → ℝ)\n  (hnneg : ∀ n, a n ≥ 0)\n  (h : ∃ y, (Tendsto (λ n => (∑ i ∈ (range n), a i)) atTop (𝓝 y))) :\n  ∃ y, Tendsto (λ n => (∑ i ∈ (range n), sqrt (a i) / (i + 1))) atTop (𝓝 y) := by\n  sorry\n"}, {"index": 345, "category": "not_exact_not_faithful", "label": "incomparable", "error_type": "misunderstanding_of_informal_statement", "provability": "false", "reasoning": "The informal statement is the classical theorem that the Cauchy product of two absolutely convergent series is absolutely convergent — true and unambiguous. The CORRECTED formalization expresses this as ∃ y, Tendsto (fun n => ∑ i ∈ range n, |∑ j ∈ range (i+1), a j * b (i-j)|) atTop (𝓝 y), i.e., ∑|c_i| converges where c_i is the Cauchy product term. The ORIGINAL has two problems: (1) it omits the absolute value |·| around the Cauchy product term, so it would be about ordinary (not absolute) convergence; (2) it has a stray `λ i =>` inside the sum, whose binder shadows the outer `∑ i`. This makes the summand a constant function of type ℕ → ℝ (not depending on the outer i), so the sum becomes `n • c` in Pi type and the Tendsto is in ℕ → ℝ under product topology, not ℝ. The types don't match, so the statement is incomparable to the informal claim. The original statement is provably false: take a = b = (1, 0, 0, ...) — both absolute-value series converge (finite support), but c(0) = a(0)·b(0) = 1 ≠ 0, so n · c(0) = n diverges pointwise, meaning no limit y : ℕ → ℝ exists. The primary error is failing to express \"absolutely convergent\" (missing |·|) and mis-encoding the Cauchy product term using a shadowing lambda.", "original": "import Mathlib\n\nopen Topology Filter Real Complex TopologicalSpace Finset\nopen scoped BigOperators\nnoncomputable section\n\n/-Informal Statement\n\nProve that the Cauchy product of two absolutely conv ement: it claims the conclusion holds for any open Ω (not just connected ones), which implies the informal version but asserts more.\n\nThe quantification pattern (explicit `a b : Ω` parameters in original vs. `∀ a b : Ω` in conclusion in corrected) is logically equivalent. The error is specifically the missing implicit premise of connectedness.", "original": "import Mathlib\n\nopen Complex Filter Function Metric Finset\nopen scoped BigOperators Topology\n\n/-Informal Statement\n\nSuppose that $f$ is holomorphic in an open set $\\Omega$. Prove that if $\\text{Im}(f)$ is constant, then $f$ is constant.\n-/\n\ntheorem Shakarchi_exercise_1_13b {f : ℂ → ℂ} (Ω : Set ℂ) (a b : Ω) (h : IsOpen Ω)\n  (hf : DifferentiableOn ℂ f Ω) (hc : ∃ (c : ℝ), ∀ z ∈ Ω, (f z).im = c) :\n  f a = f b := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Complex Filter Function Metric Finset\nopen scoped BigOperators Topology\n\n/-Informal Statement\n\nSuppose that $f$ is holomorphic in an open set $\\Omega$. Prove that if $\\text{Im}(f)$ is constant, then $f$ is constant.\n-/\n\n\ntheorem Shakarchi_exercise_1_13b {f : ℂ → ℂ} {Ω : Set ℂ}\n    (hΩ : IsOpen Ω) (hConn : IsPreconnected Ω)\n    (hf : DifferentiableOn ℂ f Ω)\n    (hc : ∃ c : ℝ, ∀ z ∈ Ω, (f z).im = c) :\n    ∀ a b : Ω, f a = f b := by\n  sorry\n"}, {"index": 361, "category": "not_exact_faithful", "label": "faithful", "error_type": "none", "provability": "true", "reasoning": "The only difference between ORIGINAL and CORRECTED is the notation: `norm z = 1` vs `‖z‖ = 1`. In Mathlib (Analysis/Normed/Group/Defs.lean line 76), `‖e‖` is defined as notation for `norm e`, so the two expressions are literally identical after notation unfolding. Both state that z is on the unit circle, s is the partial sum sequence ∑_{i<n} i·z^i, and the conclusion is that no limit y exists. The informal statement says \"the power series ∑ n z^n does not converge on any point of the unit circle\", which matches. The formalizations are logically equivalent, s ical result in complex analysis: an entire injective function must be of the form f(z) = az + b with a ≠ 0. Both the ORIGINAL and CORRECTED formalizations have semantically identical theorem statements: both use `Differentiable ℂ f` for \"entire\", `Function.Injective f` for \"injective\", and conclude `∃ (a b : ℂ), f = (λ z => a * z + b) ∧ a ≠ 0`. The only differences between them are cosmetic: indentation whitespace and some additional `open` declarations (MeasureTheory, Polynomial) in the corrected version that don't affect the theorem statement. Therefore the ORIGINAL is logically equivalent to the CORRECTED, i.e. faithful.", "original": "import Mathlib\n\nopen Complex Filter Function Metric Finset\nopen scoped BigOperators Topology\n\n/-Informal Statement\n\nProve that all entire functions that are also injective take the form $f(z) = az + b$, $a, b \\in \\mathbb{C}$ and $a \\neq 0$.\n-/\n\ntheorem Shakarchi_exercise_3_14 {f : ℂ → ℂ} (hf : Differentiable ℂ f)\n    (hf_inj : Function.Injective f) :\n    ∃ (a b : ℂ), f = (λ z => a * z + b) ∧ a ≠ 0 := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Complex Filter Function Metric Finset MeasureTheory\nopen scoped BigOperators Topology Polynomial\n\n\n\n/-Informal Statement\n\nProve that all entire functions that are also injective take the form $f(z) = az + b$, $a, b \\in \\mathbb{C}$ and $a \\neq 0$.\n-/\n\n\ntheorem Shakarchi_exercise_3_14 {f : ℂ → ℂ} (hf : Differentiable ℂ f)\n   (hf_inj : Function.Injective f) :\n   ∃ (a b : ℂ), f = (λ z => a * z + b) ∧ a ≠ 0 := by\n  sorry\n"}, {"index": 367, "category": "not_exact_not_faithful", "label": "incomparable", "error_type": "misunderstanding_of_informal_statement", "provability": "false", "reasoning": "The informal statement is the classical Blaschke condition for bounded holomorphic functions on the unit disc, which is a well-known true theorem. The ORIGINAL contains a critical error: in the conclusion, it writes `∑ (1 - zeros i)` — a complex-valued sum of `1 - z_n` — rather than `∑ (1 - |z_n|)` as the informal statement asks. The absolute value bars are missing. Additionally, the original uses `Set.range f` (bounded on all of ℂ) instead of `f '' ball 0 1` for the boundedness hypothesis, uses `f ≠ 0` instead of `¬ Set.EqOn f 0 (ball 0 1)`, and does not account for zero multiplicity (which the corrected version handles via `analyticOrderAt`). The original's stated conclusion is PROVABLY FALSE under its stated hypotheses: take the Blaschke product with zeros at z_n = -(1 - 1/n²). These zeros satisfy the Blaschke condition ∑(1 - |z_n|) = ∑1/n² < ∞, but 1 - z_n = 1 + (1 - 1/n²) → 2, so the complex series ∑(1 - z_n) diverges (terms don't tend to zero). All of the original's hypotheses are satisfied by this counterexample. Since the original's conclusion is neither implied by nor implies the informal's (different quantities — complex vs real with absolute values, and different hypothesis strengths in multiple dimensions), the two are incomparable. The primary error is misreading the informal statement's |z_n| as z_n.", "original": "import Mathlib\n\nopen Complex Filter Function Metric Finset\nopen scoped BigOperators Topology\n\n/-Informal Statement\n\nProve that if $f$ is holomorphic in the unit disc, bounded and not identically zero, and $z_{1}, z_{2}, \\ldots, z_{n}, \\ldots$ are its zeros $\\left(\\left|z_{k}\\right|<1\\right)$, then $\\sum_{n}\\left(1-\\left|z_{n}\\right|\\right)<\\infty$.\n-/\n\ntheorem Shakarchi_exercise_5_1 (f : ℂ → ℂ) (hf : DifferentiableOn ℂ f (ball 0 1))\n  (hb : Bornology.IsBounded (Set.range f)) (h0 : f ≠ 0) (zeros : ℕ → ℂ) (hz : ∀ n, f (zeros n) = 0)\n  (hzz : Set.range zeros = {z | f z = 0 ∧ z ∈ (ball (0 : ℂ) 1)}) :\n  ∃ (z : ℂ), Tendsto (λ n => (∑ i ∈ range n, (1 - zeros i))) atTop (𝓝 z) := by\n  sorry\n", "corrected": "import Mathlib\n\nopen Complex Filter Function Metric Finset\nopen scoped BigOperators Topology\n\n\n/-Informal Statement\n\nProve that if $f$ is holomorphic in the unit disc, bounded and not identically zero, and $z_{1}, z_{2}, \\ldots, z_{n}, \\ldots$ are its zeros $\\left(\\left|z_{k}\\right|<1\\right)$, then $\\sum_{n}\\left(1-\\left|z_{n}\\right|\\right)<\\infty$.\n-/\n\n\ntheorem Shakarchi_exercise_5_1\n    (f : ℂ → ℂ) (hf : DifferentiableOn ℂ f (ball 0 1))\n    (hb : Bornology.IsBounded (f '' (ball (0 : ℂ) 1)))\n    (h0 : ¬ Set.EqOn f (0 : ℂ → ℂ) (ball (0 : ℂ) 1)) :\n    Summable (fun z : {z : ℂ // f z = 0 ∧ z ∈ ball (0 : ℂ) 1} =>\n      ((analyticOrderAt f (z : ℂ)).toNat : ℝ) * (1 - ‖(z : ℂ)‖)) := by\n  sorry\n"}];
const select = document.getElementById('file-select');
const counter = document.getElementById('counter');
const reasoning = document.getElementById('reasoning');
const badgeLabel = document.getElementById('badge-label');
const badgeError = document.getElementById('badge-error');
const badgeProv = document.getElementById('badge-prov');
const badgeCat = document.getElementById('badge-cat');
const origCode = document.getElementById('original-code');
const corrCode = document.getElementById('corrected-code');
const tabs = document.querySelectorAll('.tab');
const filterLabel = document.getElementById('filter-label');
const filterError = document.getElementById('filter-error');
const filterProv = document.getElementById('filter-prov');
let currentCat = 'all';
let currentIdx = 0;
let filtered = [];
function updateCounts() {
  const fl = filterLabel.value, fe = filterError.value, fp = filterProv.value;
  let src = ALL_DATA;
  if (fl) src = src.filter(d => d.label === fl);
  if (fe) src = src.filter(d => (d.error_type || 'none') === fe);
  if (fp) src = src.filter(d => d.provability === fp);
  const counts = {exact_faithful: 0, not_exact_faithful: 0, not_exact_not_faithful: 0, all: 0};
  src.forEach(d => { counts[d.category]++; counts.all++; });
  document.getElementById('count-ef').textContent = counts.exact_faithful;
  document.getElementById('count-nef').textContent = counts.not_exact_faithful;
  document.getElementById('count-nenf').textContent = counts.not_exact_not_faithful;
  document.getElementById('count-all').textContent = counts.all;
}
updateCounts();
(function populateFilters() {
  const labels = [...new Set(ALL_DATA.map(d => d.label))].sort();
  const errors = [...new Set(ALL_DATA.map(d => d.error_type || 'none'))].sort();
  const provs = [...new Set(ALL_DATA.map(d => d.provability))].sort();
  labels.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; filterLabel.appendChild(o); });
  errors.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; filterError.appendChild(o); });
  provs.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; filterProv.appendChild(o); });
})();
filterLabel.onchange = filterError.onchange = filterProv.onchange = () => { updateCounts(); filterData(); };
function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function computeDiff(origLines, corrLines) {
  const m = origLines.length, n = corrLines.length;
  if (m + n > 500) return { orig: origLines.map(t => ({text:t, type:'same'})), corr: corrLines.map(t => ({text:t, type:'same'})) };
  const dp = Array(m+1).fill(null).map(() => Array(n+1).fill(0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = origLines[i-1] === corrLines[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);
  let origTemp = [], corrTemp = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && origLines[i-1] === corrLines[j-1]) { origTemp.push({text: origLines[i-1], type: 'same'}); corrTemp.push({text: corrLines[j-1], type: 'same'}); i--; j--; }
    else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) { corrTemp.push({text: corrLines[j-1], type: 'add'}); j--; }
    else { origTemp.push({text: origLines[i-1], type: 'del'}); i--; }
  }
  return { orig: origTemp.reverse(), corr: corrTemp.reverse() };
}
function renderDiff(lines) { return lines.map(l => { const cls = l.type === 'add' ? 'diff-add' : l.type === 'del' ? 'diff-del' : ''; return '<span class="diff-line ' + cls + '">' + escapeHtml(l.text) + '</span>'; }).join('\n'); }
function labelClass(label) {
  if (label === 'faithful') return 'badge-faithful';
  if (label === 'weaker') return 'badge-weaker';
  if (label === 'stronger') return 'badge-stronger';
  if (label === 'incomparable') return 'badge-incomparable';
  if (label === 'nl_ambiguous') return 'badge-nl_ambiguous';
  if (label === 'nl_wrong') return 'badge-nl_wrong';
  return 'badge-none';
}
function provClass(prov) {
  if (prov === 'true') return 'badge-prov-true';
  if (prov === 'false') return 'badge-prov-false';
  if (prov === 'independent') return 'badge-prov-independent';
  return 'badge-none';
}
function catLabel(cat) {
  const map = {exact_faithful:'Exact & Faithful', not_exact_faithful:'Not Exact & Faithful', not_exact_not_faithful:'Not Exact & Not Faithful'};
  return map[cat] || cat;
}
function filterData() {
  if (currentCat === 'all') filtered = ALL_DATA.slice();
  else filtered = ALL_DATA.filter(d => d.category === currentCat);
  const fl = filterLabel.value, fe = filterError.value, fp = filterProv.value;
  if (fl) filtered = filtered.filter(d => d.label === fl);
  if (fe) filtered = filtered.filter(d => (d.error_type || 'none') === fe);
  if (fp) filtered = filtered.filter(d => d.provability === fp);
  rebuildSelect(); currentIdx = 0;
  if (filtered.length > 0) show(0); else clearDisplay();
}
function rebuildSelect() { select.innerHTML = ''; filtered.forEach((item, i) => { const opt = document.createElement('option'); opt.value = i; opt.textContent = 'proofnet-' + item.index; select.appendChild(opt); }); }
function clearDisplay() { counter.textContent = '0 / 0'; reasoning.textContent = ''; badgeLabel.textContent = '-'; badgeLabel.className = 'badge badge-none'; badgeError.textContent = '-'; badgeProv.textContent = '-'; badgeProv.className = 'badge badge-none'; badgeCat.textContent = ''; origCode.innerHTML = ''; corrCode.innerHTML = ''; }
function show(idx) {
  if (filtered.length === 0) return clearDisplay();
  currentIdx = idx; const item = filtered[idx]; select.value = idx;
  counter.textContent = (idx+1) + ' / ' + filtered.length;
  reasoning.textContent = item.reasoning;
  badgeLabel.textContent = item.label; badgeLabel.className = 'badge ' + labelClass(item.label);
  badgeError.textContent = item.error_type || 'none'; badgeError.className = 'badge ' + (item.error_type && item.error_type !== 'none' ? 'badge-error' : 'badge-none');
  badgeProv.textContent = 'provable=' + item.provability; badgeProv.className = 'badge ' + provClass(item.provability);
  badgeCat.textContent = catLabel(item.category);
  const origLines = item.original.split('\n'); const corrLines = item.corrected.split('\n');
  const diff = computeDiff(origLines, corrLines);
  origCode.innerHTML = renderDiff(diff.orig); corrCode.innerHTML = renderDiff(diff.corr);
}
tabs.forEach(tab => { tab.addEventListener('click', () => { tabs.forEach(t => t.classList.remove('active')); tab.classList.add('active'); currentCat = tab.dataset.cat; filterData(); }); });
document.getElementById('prev-btn').onclick = () => { if (currentIdx > 0) show(currentIdx - 1); };
document.getElementById('next-btn').onclick = () => { if (currentIdx < filtered.length - 1) show(currentIdx + 1); };
select.onchange = () => show(parseInt(select.value));
document.addEventListener('keydown', e => { if (e.target.tagName === 'INPUT') return; if (e.key === 'ArrowLeft') { if (currentIdx > 0) show(currentIdx - 1); } if (e.key === 'ArrowRight') { if (currentIdx < filtered.length - 1) show(currentIdx + 1); } });
const searchInput = document.getElementById('search-input');
const searchBtn = document.getElementById('search-btn');
function doSearch() { const val = parseInt(searchInput.value); if (isNaN(val)) return; const found = filtered.findIndex(d => d.index === val); if (found >= 0) { show(found); searchInput.style.borderColor = '#555'; return; } const allFound = ALL_DATA.findIndex(d => d.index === val); if (allFound >= 0) { tabs.forEach(t => t.classList.remove('active')); document.querySelector('[data-cat="all"]').classList.add('active'); currentCat = 'all'; filterData(); const idx = filtered.findIndex(d => d.index === val); if (idx >= 0) show(idx); searchInput.style.borderColor = '#555'; } else { searchInput.style.borderColor = '#e94560'; } }
searchBtn.onclick = doSearch;
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
filterData();
</script>
